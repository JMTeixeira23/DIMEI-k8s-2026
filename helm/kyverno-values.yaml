# helm/kyverno-values.yaml
# Kyverno Helm values — applied by bootstrap.sh and bootstrap-azure.sh.
#
# Used by both AWS and AKS. Cloud-specific configuration (IRSA annotation,
# workload identity label) is passed as --set flags in the bootstrap scripts
# because those values come from Terraform outputs at runtime.
#
# To update Kyverno config, edit this file and re-run the relevant bootstrap.

admissionController:
  replicas: 3
  # serviceAccount annotations and podLabels for IRSA/Workload Identity are
  # set via --set in bootstrap.sh / bootstrap-azure.sh at install time.

backgroundController:
  replicas: 1

reportsController:
  replicas: 1

cleanupController:
  replicas: 1
  # The cleanup jobs use an image that may not exist in older Kyverno releases.
  # bootstrap.sh suspends the CronJobs after install to avoid ImagePullBackOff.

# Fail-open: if Kyverno is temporarily unreachable, pods are still admitted.
# This prevents a Kyverno outage from taking down the whole cluster.
# In a production hardened environment, change to Fail and ensure Kyverno
# has sufficient replicas and PodDisruptionBudgets.
failurePolicy: Ignore

# forceFailurePolicyIgnore does not work via Helm values in 3.1.4.
# bootstrap.sh patches the admission controller deployment directly with
# --forceFailurePolicyIgnore=true as a container arg after install.

webhooksCleanup:
  enabled: false

# Prometheus metrics on :8000/metrics — useful during latency measurements.
metricsService:
  create: true
  port: 8000

# Webhook timeouts — 15s gives Kyverno time to query Rekor for attestations
# without timing out on larger images or slow network conditions.
config:
  webhooks:
    - name: mutating-webhook-cfg
      timeoutSeconds: 15
    - name: validating-webhook-cfg
      timeoutSeconds: 15