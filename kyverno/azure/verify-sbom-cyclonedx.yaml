apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: verify-sbom-cyclonedx
  annotations:
    policies.kyverno.io/title: Verify CycloneDX SBOM Attestation
    policies.kyverno.io/category: Supply Chain Security
    policies.kyverno.io/severity: high
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      Requires all container images to have a valid CycloneDX SBOM attestation.
      Phase 6 — Azure AKS. Policy structure identical to AWS deployment.
      Only imageReferences differs (ACR vs ECR).
spec:
  validationFailureAction: Enforce
  background: true

  rules:
    - name: check-sbom-cyclonedx
      match:
        any:
          - resources:
              kinds: [Pod]
              namespaces: ["supply-chain-demo"]
      verifyImages:
        - imageReferences:
            - "supplychainthesis.azurecr.io/*"
          attestors:
            - count: 1
              entries:
                - keyless:
                    subject: "https://github.com/JMTeixeira23/DIMEI-k8s-2026/.github/workflows/*@refs/heads/main"
                    issuer: "https://token.actions.githubusercontent.com"
                    rekor:
                      url: https://rekor.sigstore.dev
          attestations:
            - type: "https://cyclonedx.org/bom"
              attestors:
                - count: 1
                  entries:
                    - keyless:
                        subject: "https://github.com/JMTeixeira23/DIMEI-k8s-2026/.github/workflows/*@refs/heads/main"
                        issuer: "https://token.actions.githubusercontent.com"
                        rekor:
                          url: https://rekor.sigstore.dev
          mutateDigest: true
          verifyDigest: true
          required: true
