apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: verify-image-signature
  annotations:
    policies.kyverno.io/title: Verify Image Signature
    policies.kyverno.io/category: Supply Chain Security
    policies.kyverno.io/severity: high
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      Blocks images from unapproved registries and requires Cosign keyless
      signature from the approved GitHub Actions OIDC identity.
      Phase 6 — Azure AKS. Policy structure identical to AWS deployment.
      Only imageReferences differs (ACR vs ECR).
spec:
  validationFailureAction: Enforce
  background: true

  rules:
    - name: block-unapproved-registry
      match:
        any:
          - resources:
              kinds: [Pod]
              namespaces: ["default", "supply-chain-demo"]
      validate:
        message: "Only images from supplychainthesis.azurecr.io are permitted."
        deny:
          conditions:
            any:
              - key: "{{ request.object.spec.containers[].image | [?!starts_with(@, 'supplychainthesis.azurecr.io')] | length(@) }}"
                operator: GreaterThan
                value: "0"

    - name: check-image-signature
      match:
        any:
          - resources:
              kinds: [Pod]
              namespaces: ["default", "supply-chain-demo"]
      verifyImages:
        - imageReferences:
            # ACR registry — the ONLY difference from the AWS policy
            - "supplychainthesis.azurecr.io/*"
          attestors:
            - count: 1
              entries:
                - keyless:
                    subject: "https://github.com/JMTeixeira23/DIMEI-k8s-2026/.github/workflows/*@refs/heads/main"
                    issuer: "https://token.actions.githubusercontent.com"
                    rekor:
                      url: https://rekor.sigstore.dev
          mutateDigest: true
          verifyDigest: true
          required: true
