apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: verify-slsa-provenance
  annotations:
    policies.kyverno.io/title: Verify SLSA Provenance Attestation
    policies.kyverno.io/category: Supply Chain Security
    policies.kyverno.io/severity: high
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      Requires all container images to have a valid SLSA provenance attestation
      signed by the approved CI builder identity. Proves the image was built by
      the approved pipeline and not by an arbitrary process.
      Phase 3 — Thesis: enforces SLSA Build Level 2 at admission time.
spec:
  validationFailureAction: Enforce
  background: true

  rules:
    - name: check-slsa-provenance
      match:
        any:
          - resources:
              kinds: [Pod]
              namespaces: ["supply-chain-demo"]

      verifyImages:
        - imageReferences:
            - "812982728774.dkr.ecr.*.amazonaws.com/*"

          attestors:
            - count: 1
              entries:
                - keyless:
                    subject: "https://github.com/JMTeixeira23/DIMEI-k8s-2026/.github/workflows/*@refs/heads/main"
                    issuer: "https://token.actions.githubusercontent.com"
                    rekor:
                      url: https://rekor.sigstore.dev

          attestations:
            - type: "https://slsa.dev/provenance/v1"
              attestors:
                - count: 1
                  entries:
                    - keyless:
                        subject: "https://github.com/JMTeixeira23/DIMEI-k8s-2026/.github/workflows/*@refs/heads/main"
                        issuer: "https://token.actions.githubusercontent.com"
                        rekor:
                          url: https://rekor.sigstore.dev

          mutateDigest: true
          verifyDigest: true
          required: true
