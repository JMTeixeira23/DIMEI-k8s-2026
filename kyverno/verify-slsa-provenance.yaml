apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: verify-slsa-provenance
  annotations:
    policies.kyverno.io/title: Verify SLSA Provenance Attestation
    policies.kyverno.io/category: Supply Chain Security
    policies.kyverno.io/severity: high
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      Requires all container images to have a valid SLSA provenance attestation
      signed by the approved CI builder identity. Verifies the builder.id matches
      the expected GitHub Actions workflow path, proving the image was built by
      the approved pipeline and not by an arbitrary process.
      Phase 3 — Thesis: enforces SLSA Build Level 2 at admission time.
spec:
  validationFailureAction: Enforce
  background: true

  rules:
    - name: check-slsa-provenance
      match:
        any:
          - resources:
              kinds: [Pod]
              namespaces: ["default", "supply-chain-demo"]

      verifyImages:
        - imageReferences:
            - "812982728774.dkr.ecr.*.amazonaws.com/*"

          attestors:
            - count: 1
              entries:
                - keyless:
                    subjectRegExp: "https://github.com/JMTeixeira23/DIMEI-k8s-2026/.github/workflows/.*@refs/heads/main"
                    issuer: "https://token.actions.githubusercontent.com"
                    rekor:
                      url: https://rekor.sigstore.dev

          attestations:
            - predicateType: "https://slsa.dev/provenance/v1"
              # Verify the builder.id in the provenance matches the approved
              # workflow. This is the critical check — it proves the image was
              # built by YOUR pipeline, not an attacker's pipeline.
              attestors:
                - count: 1
                  entries:
                    - keyless:
                        subjectRegExp: "https://github.com/JMTeixeira23/DIMEI-k8s-2026/.github/workflows/.*@refs/heads/main"
                        issuer: "https://token.actions.githubusercontent.com"
                        rekor:
                          url: https://rekor.sigstore.dev
              conditions:
                - all:
                    # Verify builder.id matches the approved workflow URL.
                    # An attacker who creates a forged provenance JSON with a
                    # different builder cannot pass this check because the
                    # certificate chain will not match.
                    - key: "{{ attestation.statement.predicate.runDetails.builder.id }}"
                      operator: Equals
                      value: "https://github.com/JMTeixeira23/DIMEI-k8s-2026/.github/workflows/phase2-pipeline.yml@refs/heads/main"

          mutateDigest: true
          verifyDigest: true
          required: true
