apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: verify-image-signature
  annotations:
    policies.kyverno.io/title: Verify Image Signature
    policies.kyverno.io/category: Supply Chain Security
    policies.kyverno.io/severity: high
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      Requires all container images to be signed with Cosign keyless signing
      via the approved GitHub Actions OIDC identity. Images without a valid
      Sigstore signature are rejected at admission time.
      Also blocks any image not from the approved ECR registry.
      Phase 3 — Thesis: enforces RQ supply chain integrity claim.
spec:
  validationFailureAction: Enforce
  background: true

  rules:
    # Rule 1 — Block images from any registry other than the approved ECR.
    # This is the critical rule for TC-02 and TC-03.
    # imageReferences in verifyImages only applies rules TO matching images —
    # it does not block non-matching images. This validate rule does that.
    - name: block-unapproved-registry
      match:
        any:
          - resources:
              kinds: [Pod]
              namespaces: ["default", "supply-chain-demo"]
      validate:
        message: >-
          Image '{{ element.image }}' is from an unapproved registry.
          Only images from 812982728774.dkr.ecr.eu-west-1.amazonaws.com
          are permitted in this cluster.
        foreach:
          - list: "request.object.spec.containers"
            deny:
              conditions:
                all:
                  - key: "{{ element.image }}"
                    operator: NotMatch
                    value: "812982728774.dkr.ecr.*.amazonaws.com/*"

    # Rule 2 — Verify Cosign signature for approved ECR images.
    - name: check-image-signature
      match:
        any:
          - resources:
              kinds: [Pod]
              namespaces: ["default", "supply-chain-demo"]

      verifyImages:
        - imageReferences:
            - "812982728774.dkr.ecr.*.amazonaws.com/*"

          attestors:
            - count: 1
              entries:
                - keyless:
                    subject: "https://github.com/JMTeixeira23/DIMEI-k8s-2026/.github/workflows/*@refs/heads/main"
                    issuer: "https://token.actions.githubusercontent.com"
                    rekor:
                      url: https://rekor.sigstore.dev

          mutateDigest: true
          verifyDigest: true
          required: true
