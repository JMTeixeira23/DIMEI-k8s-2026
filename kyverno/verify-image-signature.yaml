apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: verify-image-signature
  annotations:
    policies.kyverno.io/title: Verify Image Signature
    policies.kyverno.io/category: Supply Chain Security
    policies.kyverno.io/severity: high
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      Blocks images from unapproved registries and requires Cosign keyless
      signature from the approved GitHub Actions OIDC identity.
      Phase 3 — Thesis: enforces RQ supply chain integrity claim.
spec:
  validationFailureAction: Enforce
  background: true

  rules:
    - name: block-unapproved-registry
      match:
        any:
          - resources:
              kinds: [Pod]
              namespaces: ["default", "supply-chain-demo"]
      validate:
        message: "Only images from 812982728774.dkr.ecr.eu-west-1.amazonaws.com are permitted."
        foreach:
          - list: "request.object.spec.containers"
            deny:
              conditions:
                all:
                  - key: "{{ element.image }}"
                    operator: NotMatch
                    value: "812982728774.dkr.ecr.*.amazonaws.com/*"

    - name: check-image-signature
      match:
        any:
          - resources:
              kinds: [Pod]
              namespaces: ["default", "supply-chain-demo"]
      verifyImages:
        - imageReferences:
            - "812982728774.dkr.ecr.*.amazonaws.com/*"
          attestors:
            - count: 1
              entries:
                - keyless:
                    subject: "https://github.com/JMTeixeira23/DIMEI-k8s-2026/.github/workflows/*@refs/heads/main"
                    issuer: "https://token.actions.githubusercontent.com"
                    rekor:
                      url: https://rekor.sigstore.dev
          mutateDigest: true
          verifyDigest: true
          required: true
