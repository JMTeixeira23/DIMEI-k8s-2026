apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: verify-image-signature
  annotations:
    policies.kyverno.io/title: Verify Image Signature
    policies.kyverno.io/category: Supply Chain Security
    policies.kyverno.io/severity: high
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      Blocks images from unapproved registries and requires Cosign keyless
      signature from the approved GitHub Actions OIDC identity.
      Phase 3 — Thesis: enforces RQ supply chain integrity claim.
spec:
  validationFailureAction: Enforce
  background: true

  rules:
    # Rule 1 — Block any image not from the approved ECR registry.
    # Uses JMESPath to count containers whose image does not start with
    # the ECR prefix. If count > 0, the pod is denied.
    - name: block-unapproved-registry
      match:
        any:
          - resources:
              kinds: [Pod]
              namespaces: ["default", "supply-chain-demo"]
      validate:
        message: "Only images from 812982728774.dkr.ecr.eu-west-1.amazonaws.com are permitted."
        deny:
          conditions:
            any:
              - key: "{{ request.object.spec.containers[].image | [?!starts_with(@, '812982728774.dkr.ecr')] | length(@) }}"
                operator: GreaterThan
                value: "0"

    # Rule 2 — Verify Cosign signature for ECR images.
    - name: check-image-signature
      match:
        any:
          - resources:
              kinds: [Pod]
              namespaces: ["default", "supply-chain-demo"]
      verifyImages:
        - imageReferences:
            - "812982728774.dkr.ecr.*.amazonaws.com/*"
          attestors:
            - count: 1
              entries:
                - keyless:
                    subject: "https://github.com/JMTeixeira23/DIMEI-k8s-2026/.github/workflows/*@refs/heads/main"
                    issuer: "https://token.actions.githubusercontent.com"
                    rekor:
                      url: https://rekor.sigstore.dev
          mutateDigest: true
          verifyDigest: true
          required: true
