apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: verify-slsa-provenance
  annotations:
    policies.kyverno.io/title: Verify SLSA Provenance Attestation
    policies.kyverno.io/category: Supply Chain Security
    policies.kyverno.io/severity: high
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      Requires a valid signed SLSA v1.0 provenance attestation on all images.
      Cloud-agnostic — registry URL injected at apply time from
      kyverno/values/<cloud>.env by the supply chain pipeline.
spec:
  validationFailureAction: Enforce
  background: true

  rules:
    - name: check-slsa-provenance
      match:
        any:
          - resources:
              kinds: [Pod]
              namespaces: ["supply-chain-demo"]
      exclude:
        any:
          - resources:
              namespaces:
                - default
                - kyverno
                - kube-system
      verifyImages:
        - imageReferences:
            - "REGISTRY_PLACEHOLDER/*"
          attestors:
            - count: 1
              entries:
                - keyless:
                    subject: "https://github.com/JMTeixeira23/DIMEI-k8s-2026/.github/workflows/*@refs/heads/main"
                    issuer: "https://token.actions.githubusercontent.com"
                    rekor:
                      url: https://rekor.sigstore.dev
          attestations:
            - type: "https://slsa.dev/provenance/v1"
              attestors:
                - count: 1
                  entries:
                    - keyless:
                        subject: "https://github.com/JMTeixeira23/DIMEI-k8s-2026/.github/workflows/*@refs/heads/main"
                        issuer: "https://token.actions.githubusercontent.com"
                        rekor:
                          url: https://rekor.sigstore.dev
          mutateDigest: false
          verifyDigest: false
          required: true