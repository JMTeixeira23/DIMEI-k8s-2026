name: Phase 5 — Attack Simulations (AWS)

# Empirical proof that Kyverno policies block real supply chain attacks.
# Each attack simulates a realistic threat scenario.
# All attacks are expected to FAIL — a passing run means all attacks were blocked.
#
# Attack taxonomy (maps to SLSA threat model):
#   A1 — Unsigned image                  (no signature at all)
#   A2 — Unauthorized signer             (valid Cosign, wrong OIDC identity)
#   A3 — Digest tampering                (signature valid, image content changed)
#   A4 — Missing SBOM                    (signed but no CycloneDX attestation)
#   A5 — Missing provenance              (signed + SBOM but no SLSA provenance)

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  NAMESPACE: supply-chain-demo
  PASS_SYMBOL: "✅ BLOCKED (expected)"
  FAIL_SYMBOL: "❌ ADMITTED (policy failure)"

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # SETUP — verify cluster is in Enforce mode before running attacks
  # ───────────────────────────────────────────────────────────────────────────
  preflight:
    name: Preflight — Verify Enforce Mode
    runs-on: ubuntu-latest
    environment: aws

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: phase5-preflight

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region "${{ secrets.AWS_REGION }}" \
            --name "${{ secrets.EKS_CLUSTER_NAME }}"

      - name: Verify policies are in Enforce mode
        run: |
          echo "════════════════════════════════════════════════════"
          echo "  Phase 5 — Attack Simulations Preflight"
          echo "════════════════════════════════════════════════════"

          FAIL=0
          for POLICY in verify-image-signature verify-sbom-cyclonedx verify-slsa-provenance; do
            ACTION=$(kubectl get clusterpolicy "${POLICY}" \
              -o jsonpath='{.spec.validationFailureAction}' 2>/dev/null || echo "MISSING")
            READY=$(kubectl get clusterpolicy "${POLICY}" \
              -o jsonpath='{.status.ready}' 2>/dev/null || echo "false")

            if [ "${ACTION}" != "Enforce" ] || [ "${READY}" != "true" ]; then
              echo "❌ ${POLICY}: action=${ACTION} ready=${READY}"
              FAIL=1
            else
              echo "✅ ${POLICY}: Enforce, Ready"
            fi
          done

          if [ "${FAIL}" = "1" ]; then
            echo ""
            echo "ERROR: Policies not in Enforce mode — run Phase 3 first"
            exit 1
          fi

          echo ""
          echo "✅ Cluster ready for attack simulations"
          kubectl create namespace ${NAMESPACE} \
            --dry-run=client -o yaml | kubectl apply -f -

  # ───────────────────────────────────────────────────────────────────────────
  # ATTACK 1 — Unsigned Image
  # Threat: attacker pushes an image directly to ECR without going through
  # the approved pipeline (e.g. via stolen AWS credentials or ECR misconfiguration).
  # The image has no Cosign signature, no SBOM, no provenance.
  # ───────────────────────────────────────────────────────────────────────────
  attack-1-unsigned:
    name: "A1 — Unsigned Image"
    runs-on: ubuntu-latest
    needs: preflight
    environment: aws

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: phase5-a1

      - name: Log in to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region "${{ secrets.AWS_REGION }}" \
            --name "${{ secrets.EKS_CLUSTER_NAME }}"

      - name: Build and push UNSIGNED image to ECR
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          ECR_REPO: ${{ secrets.ECR_REPO_NAME }}
        run: |
          TAG="attack1-unsigned-${{ github.run_id }}"
          IMAGE="${ECR_REGISTRY}/${ECR_REPO}:${TAG}"

          # Build a real ECR image but deliberately skip all signing steps
          docker build -t "${IMAGE}" - << 'DOCKERFILE'
          FROM alpine:3.19
          LABEL threat="A1-unsigned"
          CMD ["sh", "-c", "echo ATTACK1: unsigned image running"]
          DOCKERFILE

          docker push "${IMAGE}"
          echo "ATTACK1_IMAGE=${IMAGE}" >> $GITHUB_ENV
          echo "Pushed unsigned image: ${IMAGE}"
          echo "Note: no cosign sign, no SBOM, no provenance"

      - name: "ATTACK 1 — attempt to deploy unsigned ECR image"
        run: |
          echo "════════════════════════════════════════════════════"
          echo "  A1: Unsigned image from ECR"
          echo "  Threat: attacker bypasses CI, pushes directly to ECR"
          echo "  Expected: BLOCKED by verify-image-signature"
          echo "════════════════════════════════════════════════════"

          kubectl delete pod attack1 -n ${NAMESPACE} --ignore-not-found
          sleep 2

          OUTPUT=$(kubectl run attack1 \
            --image="${ATTACK1_IMAGE}" \
            --restart=Never \
            --namespace=${NAMESPACE} \
            --command -- sh -c 'echo ATTACK1' 2>&1) && ADMITTED=true || ADMITTED=false

          echo "${OUTPUT}"
          echo ""

          if [ "${ADMITTED}" = "false" ]; then
            echo "✅ A1 PASS — unsigned ECR image was BLOCKED"
            echo "   Policy that fired: verify-image-signature (check-image-signature)"
          else
            echo "❌ A1 FAIL — unsigned image was ADMITTED (policy not working)"
            kubectl delete pod attack1 -n ${NAMESPACE} --ignore-not-found
            exit 1
          fi

  # ───────────────────────────────────────────────────────────────────────────
  # ATTACK 2 — Unauthorized Signer (wrong OIDC identity)
  # Threat: attacker signs an image using their own GitHub Actions workflow
  # (different repo/workflow path). The signature is cryptographically valid
  # but from an unauthorized identity.
  # ───────────────────────────────────────────────────────────────────────────
  attack-2-wrong-signer:
    name: "A2 — Wrong OIDC Identity"
    runs-on: ubuntu-latest
    needs: preflight
    environment: aws

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: phase5-a2

      - name: Log in to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region "${{ secrets.AWS_REGION }}" \
            --name "${{ secrets.EKS_CLUSTER_NAME }}"

      - name: Build, push and sign with LOCAL KEY (simulating wrong signer)
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          ECR_REPO: ${{ secrets.ECR_REPO_NAME }}
        run: |
          TAG="attack2-wrongkey-${{ github.run_id }}"
          IMAGE="${ECR_REGISTRY}/${ECR_REPO}:${TAG}"

          docker build -t "${IMAGE}" - << 'DOCKERFILE'
          FROM alpine:3.19
          LABEL threat="A2-wrong-signer"
          CMD ["sh", "-c", "echo ATTACK2: wrong signer"]
          DOCKERFILE

          docker push "${IMAGE}"

          # Get digest for signing
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "${IMAGE}" \
            | cut -d'@' -f2)

          # Sign with a LOCAL key instead of GitHub OIDC
          # This simulates an attacker who has Cosign but not the approved OIDC identity
          cosign generate-key-pair --output-key-prefix /tmp/attacker
          cosign sign --yes \
            --key /tmp/attacker.key \
            "${IMAGE}@${DIGEST}" || true

          echo "ATTACK2_IMAGE=${IMAGE}" >> $GITHUB_ENV
          echo "Image signed with LOCAL KEY (not GitHub OIDC)"
          echo "This simulates an attacker who can sign but lacks the approved identity"

      - name: "ATTACK 2 — attempt to deploy image signed with wrong key"
        run: |
          echo "════════════════════════════════════════════════════"
          echo "  A2: Image signed with unauthorized local key"
          echo "  Threat: attacker has Cosign but wrong OIDC identity"
          echo "  Expected: BLOCKED by verify-image-signature"
          echo "  (keyless check rejects non-OIDC or wrong-subject signatures)"
          echo "════════════════════════════════════════════════════"

          kubectl delete pod attack2 -n ${NAMESPACE} --ignore-not-found
          sleep 2

          OUTPUT=$(kubectl run attack2 \
            --image="${ATTACK2_IMAGE}" \
            --restart=Never \
            --namespace=${NAMESPACE} \
            --command -- sh -c 'echo ATTACK2' 2>&1) && ADMITTED=true || ADMITTED=false

          echo "${OUTPUT}"
          echo ""

          if [ "${ADMITTED}" = "false" ]; then
            echo "✅ A2 PASS — locally-signed image was BLOCKED"
            echo "   Policy requires keyless OIDC from token.actions.githubusercontent.com"
          else
            echo "❌ A2 FAIL — wrong-key image was ADMITTED"
            kubectl delete pod attack2 -n ${NAMESPACE} --ignore-not-found
            exit 1
          fi

  # ───────────────────────────────────────────────────────────────────────────
  # ATTACK 3 — Digest Tampering (TOCTOU)
  # Threat: attacker obtains a legitimate signed image tag, modifies the
  # image layers (rebuilds with malicious payload), pushes to same tag.
  # The original signature no longer matches the new digest.
  # This tests the verifyDigest: true protection.
  # ───────────────────────────────────────────────────────────────────────────
  attack-3-digest-tamper:
    name: "A3 — Digest Tampering (TOCTOU)"
    runs-on: ubuntu-latest
    needs: preflight
    environment: aws

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: phase5-a3

      - name: Log in to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region "${{ secrets.AWS_REGION }}" \
            --name "${{ secrets.EKS_CLUSTER_NAME }}"

      - name: Get latest legitimate signed image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          ECR_REPO: ${{ secrets.ECR_REPO_NAME }}
        run: |
          # Find the latest Phase 2 image tag
          LATEST_TAG=$(aws ecr describe-images \
            --repository-name "${ECR_REPO}" \
            --region "${{ secrets.AWS_REGION }}" \
            --output json \
            | jq -r '
                .imageDetails
                | map(select(.imageTags != null))
                | map(select(.imageTags[] | test("^sha256") | not))
                | map(select(.imageTags[] | test("-")))
                | sort_by(.imagePushedAt)
                | last
                | .imageTags[0]
              ')

          ORIGINAL_IMAGE="${ECR_REGISTRY}/${ECR_REPO}:${LATEST_TAG}"
          echo "ORIGINAL_IMAGE=${ORIGINAL_IMAGE}" >> $GITHUB_ENV
          echo "ORIGINAL_TAG=${LATEST_TAG}"       >> $GITHUB_ENV
          echo "ECR_REGISTRY=${ECR_REGISTRY}"     >> $GITHUB_ENV
          echo "ECR_REPO=${ECR_REPO}"             >> $GITHUB_ENV
          echo "Original signed image: ${ORIGINAL_IMAGE}"

      - name: Simulate digest tampering — overwrite tag with modified image
        run: |
          # The attack: pull the legitimate image tag, rebuild it with different
          # content (simulating a malicious payload injection), then push it back
          # to the SAME tag. Now the tag points to a different digest than
          # the one that was signed — the signature is no longer valid.

          TAMPERED_TAG="attack3-tampered-${{ github.run_id }}"
          TAMPERED_IMAGE="${ECR_REGISTRY}/${ECR_REPO}:${TAMPERED_TAG}"

          # Build "tampered" image — same tag structure, different content
          docker build -t "${TAMPERED_IMAGE}" - << 'DOCKERFILE'
          FROM alpine:3.19
          LABEL threat="A3-tampered"
          # Simulated malicious payload
          RUN echo "malicious_payload" > /tmp/backdoor.txt
          CMD ["sh", "-c", "cat /tmp/backdoor.txt && echo ATTACK3"]
          DOCKERFILE

          docker push "${TAMPERED_IMAGE}"

          # Get the REAL digest of the ORIGINAL signed image
          ORIGINAL_DIGEST=$(aws ecr describe-images \
            --repository-name "${ECR_REPO}" \
            --region "${{ secrets.AWS_REGION }}" \
            --output json \
            | jq -r --arg tag "${ORIGINAL_TAG}" \
              '.imageDetails[] | select(.imageTags[]? == $tag) | .imageDigest')

          # Construct the attack: use the TAMPERED image but reference it by
          # the ORIGINAL signed digest — this is what an image substitution attack looks like
          TAMPERED_DIGEST=$(docker inspect \
            --format='{{index .RepoDigests 0}}' "${TAMPERED_IMAGE}" \
            | cut -d'@' -f2)

          echo "TAMPERED_IMAGE=${TAMPERED_IMAGE}"   >> $GITHUB_ENV
          echo "TAMPERED_DIGEST=${TAMPERED_DIGEST}" >> $GITHUB_ENV
          echo "ORIGINAL_DIGEST=${ORIGINAL_DIGEST}" >> $GITHUB_ENV
          echo "Original digest: ${ORIGINAL_DIGEST}"
          echo "Tampered digest: ${TAMPERED_DIGEST}"
          echo "Digests match: $([ "${ORIGINAL_DIGEST}" = "${TAMPERED_DIGEST}" ] && echo YES || echo NO)"

      - name: "ATTACK 3 — attempt to deploy tampered image"
        run: |
          echo "════════════════════════════════════════════════════"
          echo "  A3: Tampered image (digest mismatch)"
          echo "  Threat: attacker modifies image after signing"
          echo "  Expected: BLOCKED — signature does not match new digest"
          echo "════════════════════════════════════════════════════"

          kubectl delete pod attack3 -n ${NAMESPACE} --ignore-not-found
          sleep 2

          # Deploy the tampered image (which has no valid signature for its digest)
          OUTPUT=$(kubectl run attack3 \
            --image="${TAMPERED_IMAGE}" \
            --restart=Never \
            --namespace=${NAMESPACE} \
            --command -- sh -c 'echo ATTACK3' 2>&1) && ADMITTED=true || ADMITTED=false

          echo "${OUTPUT}"
          echo ""

          if [ "${ADMITTED}" = "false" ]; then
            echo "✅ A3 PASS — tampered image was BLOCKED"
            echo "   Policy: verify-image-signature (verifyDigest detects mismatch)"
          else
            echo "❌ A3 FAIL — tampered image was ADMITTED"
            kubectl delete pod attack3 -n ${NAMESPACE} --ignore-not-found
            exit 1
          fi

  # ───────────────────────────────────────────────────────────────────────────
  # ATTACK 4 — Signed Image, Missing SBOM
  # Threat: attacker signs the image correctly (has access to OIDC token)
  # but skips the SBOM attestation step. The image has a valid signature
  # but no software bill of materials.
  # ───────────────────────────────────────────────────────────────────────────
  attack-4-missing-sbom:
    name: "A4 — Signed, No SBOM"
    runs-on: ubuntu-latest
    needs: preflight
    environment: aws

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: phase5-a4

      - name: Log in to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region "${{ secrets.AWS_REGION }}" \
            --name "${{ secrets.EKS_CLUSTER_NAME }}"

      - name: Build, push and sign WITHOUT SBOM attestation
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          ECR_REPO: ${{ secrets.ECR_REPO_NAME }}
          COSIGN_EXPERIMENTAL: "1"
        run: |
          TAG="attack4-nosbom-${{ github.run_id }}"
          IMAGE="${ECR_REGISTRY}/${ECR_REPO}:${TAG}"

          docker build -t "${IMAGE}" - << 'DOCKERFILE'
          FROM alpine:3.19
          LABEL threat="A4-no-sbom"
          CMD ["sh", "-c", "echo ATTACK4: signed but no SBOM"]
          DOCKERFILE

          docker push "${IMAGE}"

          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "${IMAGE}" \
            | cut -d'@' -f2)

          # Sign the image with valid OIDC keyless (passes verify-image-signature)
          cosign sign --yes "${IMAGE}@${DIGEST}"

          # Deliberately SKIP the SBOM attestation step
          # (no cosign attest --type cyclonedx)

          echo "ATTACK4_IMAGE=${IMAGE}@${DIGEST}" >> $GITHUB_ENV
          echo "Image signed ✓ — SBOM attestation deliberately skipped ✗"

      - name: "ATTACK 4 — attempt to deploy signed image without SBOM"
        run: |
          echo "════════════════════════════════════════════════════"
          echo "  A4: Signed image, no SBOM attestation"
          echo "  Threat: attacker has signing access but skips SBOM"
          echo "  Expected: BLOCKED by verify-sbom-cyclonedx"
          echo "════════════════════════════════════════════════════"

          kubectl delete pod attack4 -n ${NAMESPACE} --ignore-not-found
          sleep 2

          OUTPUT=$(kubectl run attack4 \
            --image="${ATTACK4_IMAGE}" \
            --restart=Never \
            --namespace=${NAMESPACE} \
            --command -- sh -c 'echo ATTACK4' 2>&1) && ADMITTED=true || ADMITTED=false

          echo "${OUTPUT}"
          echo ""

          if [ "${ADMITTED}" = "false" ]; then
            echo "✅ A4 PASS — signed-but-no-SBOM image was BLOCKED"
            echo "   Policy that fired: verify-sbom-cyclonedx"
          else
            echo "❌ A4 FAIL — image without SBOM was ADMITTED"
            kubectl delete pod attack4 -n ${NAMESPACE} --ignore-not-found
            exit 1
          fi

  # ───────────────────────────────────────────────────────────────────────────
  # ATTACK 5 — Signed + SBOM, Missing Provenance
  # Threat: attacker signs the image and generates an SBOM, but skips
  # the SLSA provenance attestation. Without provenance, there is no
  # cryptographic proof of where or how the image was built.
  # ───────────────────────────────────────────────────────────────────────────
  attack-5-missing-provenance:
    name: "A5 — Signed + SBOM, No Provenance"
    runs-on: ubuntu-latest
    needs: preflight
    environment: aws

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: phase5-a5

      - name: Log in to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region "${{ secrets.AWS_REGION }}" \
            --name "${{ secrets.EKS_CLUSTER_NAME }}"

      - name: Build, push, sign and attest SBOM — skip provenance
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          ECR_REPO: ${{ secrets.ECR_REPO_NAME }}
          COSIGN_EXPERIMENTAL: "1"
        run: |
          TAG="attack5-noprov-${{ github.run_id }}"
          IMAGE="${ECR_REGISTRY}/${ECR_REPO}:${TAG}"

          docker build -t "${IMAGE}" - << 'DOCKERFILE'
          FROM alpine:3.19
          LABEL threat="A5-no-provenance"
          CMD ["sh", "-c", "echo ATTACK5: signed+SBOM but no provenance"]
          DOCKERFILE

          docker push "${IMAGE}"

          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "${IMAGE}" \
            | cut -d'@' -f2)

          # Sign — passes verify-image-signature
          cosign sign --yes "${IMAGE}@${DIGEST}"

          # Attach SBOM — passes verify-sbom-cyclonedx
          syft "${IMAGE}@${DIGEST}" -o cyclonedx-json=/tmp/sbom-a5.json
          cosign attest --yes \
            --type cyclonedx \
            --predicate /tmp/sbom-a5.json \
            "${IMAGE}@${DIGEST}"

          # Deliberately SKIP provenance attestation
          # (no cosign attest --type slsaprovenance1)

          echo "ATTACK5_IMAGE=${IMAGE}@${DIGEST}" >> $GITHUB_ENV
          echo "Signed ✓ — SBOM ✓ — Provenance deliberately skipped ✗"

      - name: "ATTACK 5 — attempt to deploy signed+SBOM image without provenance"
        run: |
          echo "════════════════════════════════════════════════════"
          echo "  A5: Signed + SBOM, no SLSA provenance"
          echo "  Threat: attacker cannot prove build origin"
          echo "  Expected: BLOCKED by verify-slsa-provenance"
          echo "════════════════════════════════════════════════════"

          kubectl delete pod attack5 -n ${NAMESPACE} --ignore-not-found
          sleep 2

          OUTPUT=$(kubectl run attack5 \
            --image="${ATTACK5_IMAGE}" \
            --restart=Never \
            --namespace=${NAMESPACE} \
            --command -- sh -c 'echo ATTACK5' 2>&1) && ADMITTED=true || ADMITTED=false

          echo "${OUTPUT}"
          echo ""

          if [ "${ADMITTED}" = "false" ]; then
            echo "✅ A5 PASS — signed+SBOM image without provenance was BLOCKED"
            echo "   Policy that fired: verify-slsa-provenance"
          else
            echo "❌ A5 FAIL — image without provenance was ADMITTED"
            kubectl delete pod attack5 -n ${NAMESPACE} --ignore-not-found
            exit 1
          fi

  # ───────────────────────────────────────────────────────────────────────────
  # SUMMARY — collect all results and print thesis evidence table
  # ───────────────────────────────────────────────────────────────────────────
  summary:
    name: Attack Simulation Summary
    runs-on: ubuntu-latest
    needs:
      - attack-1-unsigned
      - attack-2-wrong-signer
      - attack-3-digest-tamper
      - attack-4-missing-sbom
      - attack-5-missing-provenance
    if: always()
    environment: aws

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: phase5-summary

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region "${{ secrets.AWS_REGION }}" \
            --name "${{ secrets.EKS_CLUSTER_NAME }}"

      - name: Print policy events (thesis evidence)
        run: |
          echo "════════════════════════════════════════════════════"
          echo "  Phase 5 — Policy Violation Events"
          echo "  (Save this output for thesis Chapter 6)"
          echo "════════════════════════════════════════════════════"
          echo ""

          for POLICY in verify-image-signature verify-sbom-cyclonedx verify-slsa-provenance; do
            echo "─── ${POLICY} ───"
            kubectl describe clusterpolicy "${POLICY}" \
              | grep -A3 "Warning.*PolicyViolation" | tail -30 || true
            echo ""
          done

      - name: Print attack results summary
        env:
          A1: ${{ needs.attack-1-unsigned.result }}
          A2: ${{ needs.attack-2-wrong-signer.result }}
          A3: ${{ needs.attack-3-digest-tamper.result }}
          A4: ${{ needs.attack-4-missing-sbom.result }}
          A5: ${{ needs.attack-5-missing-provenance.result }}
        run: |
          status() {
            [ "$1" = "success" ] && echo "✅ BLOCKED" || echo "❌ NOT BLOCKED"
          }

          echo ""
          echo "════════════════════════════════════════════════════════════════"
          echo "  Phase 5 — Attack Simulation Results"
          echo "  AWS EKS + Kyverno 3.1.4 + Cosign keyless + SLSA + CycloneDX"
          echo "════════════════════════════════════════════════════════════════"
          echo ""
          echo "  A1  Unsigned image (no sig, no SBOM, no prov)   $(status $A1)"
          echo "  A2  Wrong OIDC signer (local key, not OIDC)     $(status $A2)"
          echo "  A3  Digest tampering (image modified post-sign) $(status $A3)"
          echo "  A4  Missing SBOM (signed, no CycloneDX attest)  $(status $A4)"
          echo "  A5  Missing provenance (signed+SBOM, no SLSA)   $(status $A5)"
          echo ""

          PASS=0; FAIL=0
          for R in $A1 $A2 $A3 $A4 $A5; do
            [ "$R" = "success" ] && PASS=$((PASS+1)) || FAIL=$((FAIL+1))
          done

          echo "  Result: ${PASS}/5 attacks blocked"
          echo ""
          if [ "$FAIL" = "0" ]; then
            echo "  ✅ ALL ATTACKS BLOCKED — supply chain enforcement is effective"
          else
            echo "  ⚠️  ${FAIL} attack(s) not blocked — investigate policy gaps"
          fi
          echo "════════════════════════════════════════════════════════════════"

      - name: Cleanup attack pods
        if: always()
        run: |
