name: Phase 4b — Image Size vs Admission Latency (AWS)

# Tests the hypothesis: "Does image size affect Kyverno admission latency?"
# Expected finding: latency is flat across sizes (Kyverno verifies digest only,
# never pulls image layers). This would be a key thesis contribution.
#
# Four image sizes tested:
#   small  ~5MB    Alpine base only
#   medium ~30MB   Alpine + curl/jq/git
#   large  ~120MB  Python 3.12 + common packages
#   xlarge ~400MB  Node.js 20 + heavy npm deps

on:
  workflow_dispatch:
    inputs:
      iterations:
        description: 'Pods per image size (recommend 20)'
        required: true
        default: '20'
        type: string

permissions:
  id-token: write
  contents: read
  actions: read

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # JOB 1 — BUILD AND SIGN ALL 4 IMAGE SIZES
  # Each image is built, pushed to ECR, signed with Cosign, and gets
  # a full SBOM + SLSA provenance attestation — same pipeline as Phase 2.
  # ───────────────────────────────────────────────────────────────────────────
  build-and-sign:
    name: Build & Sign — ${{ matrix.size }}
    runs-on: ubuntu-latest
    environment: aws

    strategy:
      matrix:
        size: [small, medium, large, xlarge]
      fail-fast: false   # build all sizes even if one fails

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: phase4b-build-${{ matrix.size }}

      - name: Log in to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Build and push image
        id: build
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          ECR_REPO: ${{ secrets.ECR_REPO_NAME }}
          SIZE: ${{ matrix.size }}
          TAG: ${{ matrix.size }}-${{ github.sha }}-${{ github.run_id }}
        run: |
          IMAGE="${ECR_REGISTRY}/${ECR_REPO}:${TAG}"
          echo "Building ${SIZE} image → ${IMAGE}"

          # Record build start time for size reporting
          BUILD_START=$(date +%s)

          docker build \
            -t "${IMAGE}" \
            -f "docker/${SIZE}/Dockerfile" \
            docker/${SIZE}/

          BUILD_END=$(date +%s)
          BUILD_SECS=$((BUILD_END - BUILD_START))

          # Get compressed image size
          IMAGE_SIZE=$(docker image inspect "${IMAGE}" \
            --format '{{.Size}}' | awk '{printf "%.1f MB", $1/1024/1024}')
          echo "Built in ${BUILD_SECS}s — uncompressed size: ${IMAGE_SIZE}"

          # Push and capture digest
          docker push "${IMAGE}"
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "${IMAGE}" \
            | cut -d'@' -f2)

          echo "IMAGE=${IMAGE}"            >> $GITHUB_ENV
          echo "DIGEST=${DIGEST}"          >> $GITHUB_ENV
          echo "TAG=${TAG}"                >> $GITHUB_ENV
          echo "IMAGE_SIZE=${IMAGE_SIZE}"  >> $GITHUB_ENV
          echo "BUILD_SECS=${BUILD_SECS}"  >> $GITHUB_ENV

          # Save for latency job
          echo "${IMAGE}@${DIGEST}" > /tmp/image-ref-${SIZE}.txt
          echo "image=${IMAGE}"      >> $GITHUB_OUTPUT
          echo "digest=${DIGEST}"    >> $GITHUB_OUTPUT
          echo "tag=${TAG}"          >> $GITHUB_OUTPUT
          echo "size_label=${SIZE}"  >> $GITHUB_OUTPUT

      - name: Sign image (Cosign keyless)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign --yes "${IMAGE}@${DIGEST}"
          echo "✅ Signed: ${IMAGE}@${DIGEST}"

      - name: Generate SBOM (Syft → CycloneDX)
        run: |
          syft "${IMAGE}@${DIGEST}" \
            -o cyclonedx-json=/tmp/sbom-${{ matrix.size }}.json
          echo "SBOM components: $(jq '.components | length' /tmp/sbom-${{ matrix.size }}.json)"

      - name: Attest SBOM
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign attest --yes \
            --type cyclonedx \
            --predicate /tmp/sbom-${{ matrix.size }}.json \
            "${IMAGE}@${DIGEST}"
          echo "✅ SBOM attested"

      - name: Generate SLSA provenance
        run: |
          python3 - << PYEOF
          import json, os, datetime
          prov = {
            "buildDefinition": {
              "buildType": "https://github.com/JMTeixeira23/DIMEI-k8s-2026/phase4b",
              "externalParameters": {
                "workflow": os.environ.get("GITHUB_WORKFLOW", ""),
                "ref": os.environ.get("GITHUB_REF", ""),
                "imageSize": os.environ.get("SIZE", "")
              }
            },
            "runDetails": {
              "builder": {
                "id": os.environ.get("GITHUB_WORKFLOW_REF", "")
              },
              "metadata": {
                "invocationId": os.environ.get("GITHUB_RUN_ID", ""),
                "startedOn": datetime.datetime.utcnow().isoformat() + "Z"
              }
            }
          }
          with open(f"/tmp/provenance-{os.environ.get('SIZE','')}.json", "w") as f:
            json.dump(prov, f, indent=2)
          print("Provenance generated")
          PYEOF
        env:
          SIZE: ${{ matrix.size }}

      - name: Attest SLSA provenance
        env:
          COSIGN_EXPERIMENTAL: "1"
          SIZE: ${{ matrix.size }}
        run: |
          cosign attest --yes \
            --type slsaprovenance1 \
            --predicate /tmp/provenance-${SIZE}.json \
            "${IMAGE}@${DIGEST}"
          echo "✅ Provenance attested"

      - name: Save image reference artifact
        run: |
          mkdir -p /tmp/image-refs
          echo "${IMAGE}@${DIGEST}" > /tmp/image-refs/${{ matrix.size }}.txt
          echo "tag=${{ matrix.size }}-${{ github.sha }}-${{ github.run_id }}" \
            >> /tmp/image-refs/${{ matrix.size }}.txt

      - name: Upload image reference
        uses: actions/upload-artifact@v4
        with:
          name: image-ref-${{ matrix.size }}
          path: /tmp/image-refs/${{ matrix.size }}.txt
          retention-days: 1

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 2 — MEASURE ADMISSION LATENCY PER IMAGE SIZE
  # All 4 images are tested under Enforce mode.
  # The key question: does a 400MB image take longer to admit than a 5MB image?
  # ───────────────────────────────────────────────────────────────────────────
  measure-latency:
    name: Measure Admission Latency by Image Size
    runs-on: ubuntu-latest
    needs: build-and-sign
    environment: aws

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: phase4b-measure

      - name: Log in to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region "${{ secrets.AWS_REGION }}" \
            --name "${{ secrets.EKS_CLUSTER_NAME }}"

      - name: Download all image references
        uses: actions/download-artifact@v4
        with:
          pattern: image-ref-*
          path: /tmp/image-refs/
          merge-multiple: true

      - name: Verify policies are in Enforce mode
        run: |
          kubectl get clusterpolicies -o wide
          # Ensure all 3 policies are Ready and Enforce
          for policy in verify-image-signature verify-sbom-cyclonedx verify-slsa-provenance; do
            STATUS=$(kubectl get clusterpolicy "${policy}" \
              -o jsonpath='{.status.conditions[0].status}' 2>/dev/null || echo "Missing")
            echo "  ${policy}: ${STATUS}"
          done

      - name: Setup measurement namespace
        run: |
          kubectl create namespace phase4-sizetest \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Run size vs latency measurements
        env:
          ITERATIONS: ${{ github.event.inputs.iterations }}
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          ECR_REPO: ${{ secrets.ECR_REPO_NAME }}
        run: |
          N="${ITERATIONS:-20}"
          echo "Running ${N} iterations per image size"
          echo "condition,size,pod_index,admission_ms" > /tmp/size-latency.csv

          for SIZE in small medium large xlarge; do
            # Resolve image reference from artifact
            REF_FILE="/tmp/image-refs/${SIZE}.txt"
            if [ ! -f "${REF_FILE}" ]; then
              echo "⚠️  No image ref found for ${SIZE} — skipping"
              continue
            fi

            IMAGE_REF=$(head -1 "${REF_FILE}")
            echo ""
            echo "════ ${SIZE} — ${IMAGE_REF} ════"

            # Clean up any leftover pods from this size
            kubectl delete pods -n phase4-sizetest \
              -l size=${SIZE} --ignore-not-found 2>/dev/null || true
            sleep 3

            for i in $(seq 1 $N); do
              POD="size-${SIZE}-${i}"
              kubectl delete pod "${POD}" -n phase4-sizetest \
                --ignore-not-found --wait=false 2>/dev/null

              START=$(date +%s%3N)
              kubectl run "${POD}" \
                --image="${IMAGE_REF}" \
                --restart=Never \
                --namespace=phase4-sizetest \
                --labels="size=${SIZE}" \
                --command -- sh -c 'exit 0' > /dev/null 2>&1
              END=$(date +%s%3N)

              MS=$((END - START))
              echo "enforce,${SIZE},${i},${MS}" >> /tmp/size-latency.csv
              echo "  ${SIZE} ${i}/${N}: ${MS}ms"
              sleep 1
            done
          done

          echo ""
          echo "Raw CSV:"
          cat /tmp/size-latency.csv

      - name: Analyse size vs latency
        run: |
          python3 << 'PYEOF'
          import csv, statistics

          rows = []
          with open('/tmp/size-latency.csv') as f:
              for r in csv.DictReader(f):
                  rows.append(r)

          sizes = ["small", "medium", "large", "xlarge"]
          size_labels = {
              "small":  "Small\n(~5 MB)",
              "medium": "Medium\n(~30 MB)",
              "large":  "Large\n(~120 MB)",
              "xlarge": "XLarge\n(~400 MB)",
          }

          print("════════════════════════════════════════════════════")
          print("  Phase 4b — Image Size vs Admission Latency")
          print("  Hypothesis: latency is flat across image sizes")
          print("  (Kyverno verifies digest only, never pulls layers)")
          print("════════════════════════════════════════════════════")
          print("")

          results = {}
          for size in sizes:
              data = [int(r["admission_ms"]) for r in rows if r["size"] == size]
              if not data:
                  continue
              s = sorted(data)
              results[size] = {
                  "n":      len(data),
                  "mean":   statistics.mean(data),
                  "median": statistics.median(data),
                  "stdev":  statistics.stdev(data),
                  "min":    min(data),
                  "max":    max(data),
                  "p95":    s[int(len(s)*0.95)],
              }
              d = results[size]
              print(f"{size_labels[size].replace(chr(10),' ')}:")
              print(f"  mean={d['mean']:.0f}ms  median={d['median']:.0f}ms  "
                    f"stdev={d['stdev']:.0f}ms  p95={d['p95']:.0f}ms")

          # Check if hypothesis holds — compare min and max mean
          means = [results[s]["mean"] for s in sizes if s in results]
          if means:
              spread = max(means) - min(means)
              print("")
              print(f"Mean spread across all sizes: {spread:.0f}ms")
              if spread < 100:
                  print("✅ HYPOTHESIS SUPPORTED — latency is flat across image sizes")
                  print("   Kyverno admission cost is O(1) with respect to image size.")
                  print("   This confirms that enforcement overhead is predictable")
                  print("   regardless of workload image complexity.")
              else:
                  print("⚠️  HYPOTHESIS CHALLENGED — significant spread detected")
                  print("   Investigate node image pull caching effects.")

          print("")
          print("CSV (for thesis table):")
          print("size,approx_mb,n,mean_ms,median_ms,stdev_ms,p95_ms")
          approx = {"small": 5, "medium": 30, "large": 120, "xlarge": 400}
          for size in sizes:
              if size in results:
                  d = results[size]
                  print(f"{size},{approx[size]},{d['n']},{d['mean']:.0f},"
                        f"{d['median']:.0f},{d['stdev']:.0f},{d['p95']:.0f}")
          PYEOF

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: size-latency-results
          path: /tmp/size-latency.csv
          retention-days: 30

      - name: Cleanup
        if: always()
        run: |
          kubectl delete pods -n phase4-sizetest --all --ignore-not-found
          echo "✅ Cleanup complete"