name: Phase 3 — Kyverno Policies (AWS)

on:
  push:
    branches: [main]
    paths:
      - 'kyverno/aws/**'        # policy change → re-apply immediately
      - 'kyverno/*.yaml'        # shared policy change
  workflow_dispatch:
    inputs:
      mode:
        description: 'Policy validation failure action'
        required: true
  workflow_call:                # triggered by Phase 2 after new image is attested
    inputs:
      mode:
        description: 'Policy enforcement mode'
        required: false
        default: 'Enforce'
        type: string
        default: 'Audit'
        type: choice
        options: [Audit, Enforce]

permissions:
  id-token: write
  contents: read

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # JOB 1 — APPLY POLICIES
  # ───────────────────────────────────────────────────────────────────────────
  apply-policies:
    name: Apply Kyverno ClusterPolicies
    runs-on: ubuntu-latest
    environment: aws

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: phase3-apply

      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --region "${{ secrets.AWS_REGION }}" \
            --name "${{ secrets.EKS_CLUSTER_NAME }}"

      - name: Set policy mode
        run: |
          MODE="${{ inputs.mode || github.event.inputs.mode || 'Enforce' }}"
          echo "Setting validationFailureAction to: ${MODE}"

          for f in kyverno/verify-image-signature.yaml \
                   kyverno/verify-slsa-provenance.yaml \
                   kyverno/verify-sbom-cyclonedx.yaml; do
            # Set the failure action
            sed -i "s/validationFailureAction: .*/validationFailureAction: ${MODE}/" "$f"

            # Kyverno rule: mutateDigest must be false in Audit mode, true in Enforce
            if [ "${MODE}" = "Audit" ]; then
              sed -i "s/mutateDigest: .*/mutateDigest: false/" "$f"
              sed -i "s/verifyDigest: .*/verifyDigest: false/" "$f"
            else
              sed -i "s/mutateDigest: .*/mutateDigest: true/" "$f"
              sed -i "s/verifyDigest: .*/verifyDigest: true/" "$f"
            fi

            echo "  ✅ ${f} → ${MODE}"
          done

      - name: Apply ClusterPolicies
        run: |
          kubectl apply --server-side --force-conflicts -f kyverno/verify-image-signature.yaml
          kubectl apply --server-side --force-conflicts -f kyverno/verify-slsa-provenance.yaml
          kubectl apply --server-side --force-conflicts -f kyverno/verify-sbom-cyclonedx.yaml

          echo ""
          echo "─── Applied policies ───"
          kubectl get clusterpolicies -o wide

      - name: Wait for policies to be ready
        run: |
          sleep 10
          kubectl get clusterpolicies -o wide

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 2 — TEST MATRIX
  # ───────────────────────────────────────────────────────────────────────────
  test-matrix:
    name: Policy Test Matrix
    runs-on: ubuntu-latest
    needs: apply-policies
    environment: aws

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: phase3-test

      - name: Log in to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --region "${{ secrets.AWS_REGION }}" \
            --name "${{ secrets.EKS_CLUSTER_NAME }}"

      - name: Get latest signed image from ECR
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          ECR_REPO: ${{ secrets.ECR_REPO_NAME }}
        run: |
          # Phase 2 images have tags in sha-runid format (e.g. abc123-22801005069)
          # which always contain a hyphen. Phase 1 tags are plain 40-char SHAs.
          # Cosign artefacts start with sha256-.
          # Filter: must contain hyphen AND not start with sha256
          LATEST_TAG=$(aws ecr describe-images \
            --repository-name "${ECR_REPO}" \
            --region "${{ secrets.AWS_REGION }}" \
            --output json \
            | jq -r '
                .imageDetails
                | map(select(.imageTags != null))
                | map(select(
                    .imageTags[] | test("^sha256") | not
                  ))
                | map(select(
                    .imageTags[] | test("-")
                  ))
                | map(select(
                    .imageTags[] | test("^(attack|size-)") | not
                  ))
                | sort_by(.imagePushedAt)
                | last
                | .imageTags[0]
              ')

          echo "Latest real image tag: ${LATEST_TAG}"

          if [ -z "${LATEST_TAG}" ] || [ "${LATEST_TAG}" = "null" ]; then
            echo "ERROR: could not find a real image tag in ECR"
            aws ecr describe-images \
              --repository-name "${ECR_REPO}" \
              --region "${{ secrets.AWS_REGION }}" \
              --output json | jq '.imageDetails[].imageTags'
            exit 1
          fi

          SIGNED_IMAGE="${ECR_REGISTRY}/${ECR_REPO}:${LATEST_TAG}"
          echo "SIGNED_IMAGE=${SIGNED_IMAGE}" >> $GITHUB_ENV
          echo "Latest signed image: ${SIGNED_IMAGE}"

      - name: Setup test namespace
        run: |
          kubectl create namespace supply-chain-demo --dry-run=client -o yaml \
            | kubectl apply -f -

      - name: Clean up any leftover test pods
        run: |
          kubectl delete pod tc-01 tc-02 tc-03 \
            -n supply-chain-demo --ignore-not-found
          sleep 3

      - name: "TC-01: Signed image — expect ADMIT"
        run: |
          echo "════════════════════════════════════════"
          echo "TC-01: Signed image with SBOM + provenance"
          echo "Expected: ADMITTED"
          echo "════════════════════════════════════════"

          if kubectl run tc-01 \
            --image="${SIGNED_IMAGE}" \
            --restart=Never \
            --namespace=supply-chain-demo \
            --command -- sh -c 'echo TC-01 passed' 2>&1; then
            echo "✅ TC-01 PASS — signed image was ADMITTED as expected"
            sleep 15
            kubectl logs tc-01 -n supply-chain-demo 2>/dev/null || true
            kubectl delete pod tc-01 -n supply-chain-demo --ignore-not-found
          else
            echo "❌ TC-01 FAIL — signed image was unexpectedly BLOCKED"
            kubectl describe clusterpolicy verify-image-signature
            exit 1
          fi

      - name: "TC-02: Unsigned image (nginx) — expect BLOCK"
        run: |
          echo "════════════════════════════════════════"
          echo "TC-02: Unsigned image from Docker Hub"
          echo "Expected: BLOCKED"
          echo "════════════════════════════════════════"

          OUTPUT=$(kubectl run tc-02 \
            --image="nginx:latest" \
            --restart=Never \
            --namespace=supply-chain-demo \
            --command -- sh -c 'echo TC-02' 2>&1) && ADMITTED=true || ADMITTED=false

          echo "${OUTPUT}"

          if [ "${ADMITTED}" = "false" ]; then
            echo "✅ TC-02 PASS — unsigned image was BLOCKED as expected"
          else
            MODE="${{ inputs.mode || github.event.inputs.mode || 'Enforce' }}"
            if [ "${MODE}" = "Audit" ]; then
              echo "⚠️  TC-02 INFO — Audit mode allows admission but logs violation (expected)"
              kubectl delete pod tc-02 -n supply-chain-demo --ignore-not-found
            else
              echo "❌ TC-02 FAIL — unsigned image was admitted in Enforce mode"
              exit 1
            fi
          fi

      - name: "TC-03: Wrong registry image — expect BLOCK"
        run: |
          echo "════════════════════════════════════════"
          echo "TC-03: Image from unrecognised registry (alpine)"
          echo "Expected: BLOCKED"
          echo "════════════════════════════════════════"

          OUTPUT=$(kubectl run tc-03 \
            --image="alpine:3.19" \
            --restart=Never \
            --namespace=supply-chain-demo \
            --command -- sh -c 'echo TC-03' 2>&1) && ADMITTED=true || ADMITTED=false

          echo "${OUTPUT}"

          if [ "${ADMITTED}" = "false" ]; then
            echo "✅ TC-03 PASS — image from wrong registry was BLOCKED as expected"
          else
            MODE="${{ inputs.mode || github.event.inputs.mode || 'Enforce' }}"
            if [ "${MODE}" = "Audit" ]; then
              echo "⚠️  TC-03 INFO — Audit mode allows admission but logs violation (expected)"
              kubectl delete pod tc-03 -n supply-chain-demo --ignore-not-found
            else
              echo "❌ TC-03 FAIL — image from wrong registry was admitted in Enforce mode"
              exit 1
            fi
          fi

      - name: Print policy reports (thesis evidence)
        run: |
          echo "════════════════════════════════════════════════════"
          echo "  Phase 3 — Kyverno Policy Reports"
          echo "  Save this output for thesis Chapter 6"
          echo "════════════════════════════════════════════════════"
          echo ""
          echo "─── ClusterPolicies ───"
          kubectl get clusterpolicies -o wide
          echo ""
          echo "─── PolicyReports (supply-chain-demo) ───"
          kubectl get policyreport -n supply-chain-demo 2>/dev/null \
            || echo "(none yet)"
          echo ""
          echo "─── Detailed policy report ───"
          kubectl get policyreport -n supply-chain-demo -o yaml 2>/dev/null \
            || echo "(none yet)"

      - name: Summary
        run: |
          MODE="${{ inputs.mode || github.event.inputs.mode || 'Enforce' }}"
          echo ""
          echo "════════════════════════════════════════════════════"
          echo "  Phase 3 Test Matrix — Mode: ${MODE}"
          echo "════════════════════════════════════════════════════"
          echo "  TC-01  Signed image + SBOM + provenance  → ADMIT"
          echo "  TC-02  Unsigned image (nginx:latest)      → BLOCK (Enforce) / LOG (Audit)"
          echo "  TC-03  Wrong registry (alpine:3.19)       → BLOCK (Enforce) / LOG (Audit)"
          echo ""
          if [ "${MODE}" = "Audit" ]; then
            echo "  ℹ️  Running in Audit mode — re-run with mode=Enforce to enable blocking"
          else
            echo "  🔒 Running in Enforce mode — non-compliant images are actively blocked"
          fi
          echo "════════════════════════════════════════════════════"