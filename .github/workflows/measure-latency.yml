name: Measure Admission Latency

# ─────────────────────────────────────────────────────────────────────────────
# GENERIC LATENCY MEASUREMENT — runs on AWS EKS, Azure AKS, or both.
# Not part of the CD pipeline — run manually to collect thesis data.
#
# Measures Kyverno admission overhead across three conditions:
#   baseline  — policies deleted (no Kyverno overhead)
#   audit     — policies in Audit mode
#   enforce   — policies in Enforce mode
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      cloud:
        description: 'Which cloud(s) to measure'
        required: true
        default: 'both'
        type: choice
        options:
          - both
          - aws
          - azure
      iterations:
        description: 'Pods per condition (default: 30)'
        required: false
        default: '30'
      size_iterations:
        description: 'Pods per image size — size experiment (default: 20)'
        required: false
        default: '20'

permissions:
  id-token: write
  contents: read
  actions: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  measure:
    name: Latency (${{ matrix.cloud }})
    runs-on: ubuntu-latest
    environment: ${{ matrix.cloud }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - cloud: aws
          - cloud: azure

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check cloud selection
        run: |
          SELECTED="${{ inputs.cloud }}"
          THIS="${{ matrix.cloud }}"
          if [ "${SELECTED}" != "both" ] && [ "${SELECTED}" != "${THIS}" ]; then
            echo "Skipping ${THIS} — selected: ${SELECTED}"
            exit 0
          fi

      # ── Auth ──────────────────────────────────────────────────────────────

      - name: Auth — AWS
        if: matrix.cloud == 'aws'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: latency-${{ github.run_id }}

      - name: Auth — Azure
        if: matrix.cloud == 'azure'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # ── Registry login ────────────────────────────────────────────────────

      - name: Registry login — ECR
        if: matrix.cloud == 'aws'
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Registry login — ACR
        if: matrix.cloud == 'azure'
        run: az acr login --name "${{ secrets.ACR_LOGIN_SERVER }}"

      # ── Kubeconfig ────────────────────────────────────────────────────────

      - name: Kubeconfig — EKS
        if: matrix.cloud == 'aws'
        run: |
          aws eks update-kubeconfig \
            --region "${{ secrets.AWS_REGION }}" \
            --name "${{ secrets.EKS_CLUSTER_NAME }}"

      - name: Kubeconfig — AKS
        if: matrix.cloud == 'azure'
        run: |
          az aks get-credentials \
            --resource-group "${{ secrets.AKS_RESOURCE_GROUP }}" \
            --name "${{ secrets.AKS_CLUSTER_NAME }}" \
            --overwrite-existing

      # ── Get latest signed image ───────────────────────────────────────────

      - name: Get latest signed image (AWS)
        if: matrix.cloud == 'aws'
        run: |
          LATEST_TAG=$(aws ecr describe-images \
            --repository-name "${{ secrets.ECR_REPO_NAME }}" \
            --region "${{ secrets.AWS_REGION }}" \
            --output json \
            | jq -r '
                .imageDetails
                | map(select(.imageTags != null))
                | map(select(.imageTags[] | test("^sha256") | not))
                | map(select(.imageTags[] | test("-")))
                | map(select(.imageTags[] | test("^(attack|size-)") | not))
                | sort_by(.imagePushedAt)
                | last
                | .imageTags[0]
              ')
          REGISTRY="${{ steps.ecr-login.outputs.registry }}"
          echo "SIGNED_IMAGE=${REGISTRY}/${{ secrets.ECR_REPO_NAME }}:${LATEST_TAG}" >> $GITHUB_ENV
          echo "Latest image: ${SIGNED_IMAGE}"

      - name: Get latest signed image (Azure)
        if: matrix.cloud == 'azure'
        run: |
          LATEST_TAG=$(az acr repository show-tags \
            --name "${{ secrets.ACR_LOGIN_SERVER }}" \
            --repository "${{ secrets.ACR_REPO_NAME }}" \
            --orderby time_desc \
            --output tsv \
            | grep -E '^[a-f0-9]+-[0-9]+$' \
            | grep -vE '^(attack|size-)' \
            | head -1)
          echo "SIGNED_IMAGE=${{ secrets.ACR_LOGIN_SERVER }}/${{ secrets.ACR_REPO_NAME }}:${LATEST_TAG}" >> $GITHUB_ENV
          echo "Latest image: ${SIGNED_IMAGE}"

      # ── Save and delete policies (baseline measurement) ───────────────────

      - name: Save policies and delete for baseline
        run: |
          mkdir -p /tmp/policies-backup
          kubectl get clusterpolicy \
            verify-image-signature \
            verify-sbom-cyclonedx \
            verify-slsa-provenance \
            -o yaml > /tmp/policies-backup/all-policies.yaml 2>/dev/null || true

          kubectl delete clusterpolicy \
            verify-image-signature \
            verify-sbom-cyclonedx \
            verify-slsa-provenance \
            --ignore-not-found

          # Wait for webhooks to deregister
          sleep 10
          echo "✅ Policies removed — baseline measurement ready"

      # ── Measure function ──────────────────────────────────────────────────

      - name: Measure baseline latency (no policies)
        run: |
          N=${{ github.event.inputs.iterations }}
          echo "condition,latency_ms" > /tmp/baseline.csv

          for i in $(seq 1 ${N}); do
            kubectl delete pod latency-probe --ignore-not-found 2>/dev/null
            kubectl wait pod/latency-probe --for=delete --timeout=30s 2>/dev/null || true

            START=$(date +%s%3N)
            kubectl run latency-probe \
              --image="${SIGNED_IMAGE}" \
              --restart=Never \
              --command -- sh -c 'exit 0' 2>/dev/null

            for j in $(seq 1 20); do
              PHASE=$(kubectl get pod latency-probe \
                -o jsonpath='{.status.phase}' 2>/dev/null || echo "Pending")
              [ "${PHASE}" = "Succeeded" ] || [ "${PHASE}" = "Failed" ] && break
              sleep 0.5
            done
            END=$(date +%s%3N)

            echo "baseline,$((END - START))" >> /tmp/baseline.csv
            sleep 1
          done

          echo "✅ Baseline done (${N} iterations)"

      - name: Restore policies in Audit mode
        run: |
          REGISTRY_VAL=$(grep '^REGISTRY=' kyverno/values/${{ matrix.cloud }}.env \
            | cut -d= -f2)
          mkdir -p /tmp/kyverno-audit
          for f in kyverno/verify-*.yaml; do
            sed "s|REGISTRY_PLACEHOLDER|${REGISTRY_VAL}|g" "$f" \
              | sed "s/validationFailureAction: .*/validationFailureAction: Audit/" \
              | sed "s/mutateDigest: .*/mutateDigest: false/" \
              | sed "s/verifyDigest: .*/verifyDigest: false/" \
              > "/tmp/kyverno-audit/$(basename $f)"
          done
          kubectl apply --server-side --force-conflicts -f /tmp/kyverno-audit/
          sleep 10
          echo "✅ Policies in Audit mode"

      - name: Measure audit latency
        run: |
          N=${{ github.event.inputs.iterations }}
          echo "condition,latency_ms" > /tmp/audit.csv

          for i in $(seq 1 ${N}); do
            kubectl delete pod latency-probe --ignore-not-found 2>/dev/null
            kubectl wait pod/latency-probe --for=delete --timeout=30s 2>/dev/null || true

            START=$(date +%s%3N)
            kubectl run latency-probe \
              --image="${SIGNED_IMAGE}" \
              --restart=Never \
              --command -- sh -c 'exit 0' 2>/dev/null

            for j in $(seq 1 20); do
              PHASE=$(kubectl get pod latency-probe \
                -o jsonpath='{.status.phase}' 2>/dev/null || echo "Pending")
              [ "${PHASE}" = "Succeeded" ] || [ "${PHASE}" = "Failed" ] && break
              sleep 0.5
            done
            END=$(date +%s%3N)

            echo "audit,$((END - START))" >> /tmp/audit.csv
            sleep 1
          done
          echo "✅ Audit done (${N} iterations)"

      - name: Switch policies to Enforce mode
        run: |
          REGISTRY_VAL=$(grep '^REGISTRY=' kyverno/values/${{ matrix.cloud }}.env \
            | cut -d= -f2)
          mkdir -p /tmp/kyverno-enforce
          for f in kyverno/verify-*.yaml; do
            sed "s|REGISTRY_PLACEHOLDER|${REGISTRY_VAL}|g" "$f" \
              | sed "s/validationFailureAction: .*/validationFailureAction: Enforce/" \
              | sed "s/mutateDigest: .*/mutateDigest: true/" \
              | sed "s/verifyDigest: .*/verifyDigest: true/" \
              > "/tmp/kyverno-enforce/$(basename $f)"
          done
          kubectl apply --server-side --force-conflicts -f /tmp/kyverno-enforce/
          sleep 10
          echo "✅ Policies in Enforce mode"

      - name: Measure enforce latency
        run: |
          N=${{ github.event.inputs.iterations }}
          echo "condition,latency_ms" > /tmp/enforce.csv

          for i in $(seq 1 ${N}); do
            kubectl delete pod latency-probe --ignore-not-found 2>/dev/null
            kubectl wait pod/latency-probe --for=delete --timeout=30s 2>/dev/null || true

            START=$(date +%s%3N)
            kubectl run latency-probe \
              --image="${SIGNED_IMAGE}" \
              --restart=Never \
              --command -- sh -c 'exit 0' 2>/dev/null

            for j in $(seq 1 20); do
              PHASE=$(kubectl get pod latency-probe \
                -o jsonpath='{.status.phase}' 2>/dev/null || echo "Pending")
              [ "${PHASE}" = "Succeeded" ] || [ "${PHASE}" = "Failed" ] && break
              sleep 0.5
            done
            END=$(date +%s%3N)

            echo "enforce,$((END - START))" >> /tmp/enforce.csv
            sleep 1
          done
          echo "✅ Enforce done (${N} iterations)"

      # ── Aggregate results ─────────────────────────────────────────────────

      - name: Compute statistics and print results
        env:
          CLOUD: ${{ matrix.cloud }}
          ITERATIONS: ${{ github.event.inputs.iterations }}
        run: |
          grep -h -v "^condition" /tmp/baseline.csv /tmp/audit.csv /tmp/enforce.csv \
            | grep -v "^$" > /tmp/all-raw.csv
          echo "=== raw CSV preview ===" && head -6 /tmp/all-raw.csv
          python3 scripts/latency_stats.py

      - name: Upload latency CSV
        uses: actions/upload-artifact@v4
        with:
          name: latency-${{ matrix.cloud }}
          path: /tmp/latency-${{ matrix.cloud }}.csv
          retention-days: 30

      - name: Cleanup probe pod
        if: always()
        run: kubectl delete pod latency-probe --ignore-not-found

  # ─────────────────────────────────────────────────────────────────────────────

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 2 — IMAGE SIZE vs ADMISSION LATENCY
  # Hypothesis: Kyverno admission cost is O(1) w.r.t. image size.
  # Kyverno verifies the digest against Rekor — it never pulls image layers.
  # Four images: small (~5MB), medium (~30MB), large (~120MB), xlarge (~400MB)
  # ─────────────────────────────────────────────────────────────────────────────

  build-size-images:
    name: Build Size Images (${{ matrix.cloud }})
    runs-on: ubuntu-latest
    environment: ${{ matrix.cloud }}
    needs: measure
    strategy:
      fail-fast: false
      matrix:
        include:
          - cloud: aws
          - cloud: azure

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check cloud selection
        run: |
          SELECTED="${{ inputs.cloud }}"
          THIS="${{ matrix.cloud }}"
          if [ "${SELECTED}" != "both" ] && [ "${SELECTED}" != "${THIS}" ]; then
            echo "Skipping ${THIS} -- selected: ${SELECTED}"
            exit 0
          fi

      - name: Auth -- AWS
        if: matrix.cloud == 'aws'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: size-build-${{ github.run_id }}

      - name: Auth -- Azure
        if: matrix.cloud == 'azure'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Registry login -- ECR
        if: matrix.cloud == 'aws'
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Registry login -- ACR
        if: matrix.cloud == 'azure'
        run: az acr login --name "${{ secrets.ACR_LOGIN_SERVER }}"

      - name: Set unified registry vars
        run: |
          if [ "${{ matrix.cloud }}" = "aws" ]; then
            echo "REGISTRY=${{ steps.ecr-login.outputs.registry }}" >> $GITHUB_ENV
            echo "REPO=${{ secrets.ECR_REPO_NAME }}" >> $GITHUB_ENV
          else
            echo "REGISTRY=${{ secrets.ACR_LOGIN_SERVER }}" >> $GITHUB_ENV
            echo "REPO=${{ secrets.ACR_REPO_NAME }}" >> $GITHUB_ENV
          fi

      - name: Install Cosign and Syft
        run: |
          curl -sSfL https://github.com/sigstore/cosign/releases/download/v2.2.3/cosign-linux-amd64 \
            -o /usr/local/bin/cosign && chmod +x /usr/local/bin/cosign
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
            | sh -s -- -b /usr/local/bin v0.105.1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build, push, sign and attest all size images
        run: |
          mkdir -p /tmp/size-refs

          for SIZE in small medium large xlarge; do
            TAG="size-${SIZE}-${{ github.run_id }}"
            IMAGE="${REGISTRY}/${REPO}:${TAG}"

            echo "Building ${SIZE}..."
            docker buildx build \
              --tag "${IMAGE}" \
              --push \
              --provenance=false \
              --metadata-file /tmp/meta-${SIZE}.json \
              docker/${SIZE}/

            DIGEST=$(jq -r '."containerimage.digest"' /tmp/meta-${SIZE}.json)
            IMAGE_REF="${REGISTRY}/${REPO}@${DIGEST}"

            cosign sign --yes "${IMAGE_REF}"

            syft "${IMAGE_REF}" -o cyclonedx-json=/tmp/sbom-${SIZE}.json
            cosign attest --yes \
              --type cyclonedx \
              --predicate /tmp/sbom-${SIZE}.json \
              "${IMAGE_REF}"

            REPO_URL="https://github.com/${{ github.repository }}"
            RUN_ID="${{ github.run_id }}"
            echo "{\"buildDefinition\":{\"buildType\":\"https://slsa.dev/container-based-build/v0.1\",\"externalParameters\":{\"size\":\"${SIZE}\"}},\"runDetails\":{\"builder\":{\"id\":\"${REPO_URL}/actions/runs/${RUN_ID}\"}}}" > /tmp/prov-${SIZE}.json
            cosign attest --yes \
              --type slsaprovenance1 \
              --predicate /tmp/prov-${SIZE}.json \
              "${IMAGE_REF}"

            echo "${IMAGE_REF}" > /tmp/size-refs/${SIZE}.txt
            echo "Done: ${SIZE} -> ${IMAGE_REF}"
          done

      - name: Upload size image refs
        uses: actions/upload-artifact@v4
        with:
          name: size-refs-${{ matrix.cloud }}
          path: /tmp/size-refs/
          retention-days: 1

  measure-size-latency:
    name: Measure Size Latency (${{ matrix.cloud }})
    runs-on: ubuntu-latest
    environment: ${{ matrix.cloud }}
    needs: build-size-images
    strategy:
      fail-fast: false
      matrix:
        include:
          - cloud: aws
          - cloud: azure

    steps:
      - name: Check cloud selection
        run: |
          SELECTED="${{ inputs.cloud }}"
          THIS="${{ matrix.cloud }}"
          if [ "${SELECTED}" != "both" ] && [ "${SELECTED}" != "${THIS}" ]; then
            echo "Skipping ${THIS} -- selected: ${SELECTED}"
            exit 0
          fi

      - name: Auth -- AWS
        if: matrix.cloud == 'aws'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: size-measure-${{ github.run_id }}

      - name: Auth -- Azure
        if: matrix.cloud == 'azure'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Kubeconfig -- EKS
        if: matrix.cloud == 'aws'
        run: |
          aws eks update-kubeconfig \
            --region "${{ secrets.AWS_REGION }}" \
            --name "${{ secrets.EKS_CLUSTER_NAME }}"

      - name: Kubeconfig -- AKS
        if: matrix.cloud == 'azure'
        run: |
          az aks get-credentials \
            --resource-group "${{ secrets.AKS_RESOURCE_GROUP }}" \
            --name "${{ secrets.AKS_CLUSTER_NAME }}" \
            --overwrite-existing

      - name: Download size image refs
        uses: actions/download-artifact@v4
        with:
          name: size-refs-${{ matrix.cloud }}
          path: /tmp/size-refs/

      - name: Measure admission latency per image size
        run: |
          N=${{ github.event.inputs.size_iterations }}
          echo "cloud,size,approx_mb,latency_ms" > /tmp/size-latency-raw.csv

          for SIZE in small medium large xlarge; do
            case ${SIZE} in
              small)  MB=5   ;;
              medium) MB=30  ;;
              large)  MB=120 ;;
              xlarge) MB=400 ;;
            esac

            IMAGE_REF=$(cat /tmp/size-refs/${SIZE}.txt)
            echo "Measuring ${SIZE} (~${MB}MB) -- ${N} iterations..."

            for j in $(seq 1 ${N}); do
              kubectl delete pod size-probe --ignore-not-found 2>/dev/null
              kubectl wait pod/size-probe --for=delete --timeout=30s 2>/dev/null || true

              START=$(date +%s%3N)
              kubectl run size-probe \
                --image="${IMAGE_REF}" \
                --restart=Never \
                --command -- sh -c 'exit 0' 2>/dev/null

              for k in $(seq 1 20); do
                PHASE=$(kubectl get pod size-probe \
                  -o jsonpath='{.status.phase}' 2>/dev/null || echo "Pending")
                [ "${PHASE}" = "Succeeded" ] || [ "${PHASE}" = "Failed" ] && break
                sleep 0.5
              done
              END=$(date +%s%3N)

              echo "${{ matrix.cloud }},${SIZE},${MB},$((END - START))" >> /tmp/size-latency-raw.csv
              sleep 1
            done
          done

      - name: Compute size statistics
        env:
          CLOUD: ${{ matrix.cloud }}
          ITERATIONS: ${{ github.event.inputs.size_iterations }}
        run: |
          python3 scripts/size_latency_stats.py

      - name: Upload size latency CSV
        uses: actions/upload-artifact@v4
        with:
          name: size-latency-${{ matrix.cloud }}
          path: /tmp/size-latency-${{ matrix.cloud }}.csv
          retention-days: 30

      - name: Cleanup
        if: always()
        run: kubectl delete pod size-probe --ignore-not-found