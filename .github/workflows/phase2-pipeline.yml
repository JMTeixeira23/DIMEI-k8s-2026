name: Phase 2 — Sign + SBOM + Provenance (AWS)

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/phase2-pipeline.yml'
      - 'docker/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  actions: read

env:
  IMAGE_NAME: hello-world
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # JOB 1 — BUILD & PUSH
  # Uses --metadata-file to capture the digest directly from buildx output.
  # This is the most reliable method — no secondary inspect/pull needed.
  # ───────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    environment: aws
    outputs:
      image-digest: ${{ steps.push.outputs.digest }}
      full-image:   ${{ steps.push.outputs.full-image }}
      image-ref:    ${{ steps.push.outputs.image-ref }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: phase2-build

      - name: Log in to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push to ECR
        id: push
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          ECR_REPO: ${{ secrets.ECR_REPO_NAME }}
        run: |
          FULL_IMAGE="${ECR_REGISTRY}/${ECR_REPO}:${IMAGE_TAG}"

          # --metadata-file captures digest directly from buildx — most reliable method
          docker buildx build \
            --build-arg GIT_SHA="${IMAGE_TAG}" \
            --tag "${FULL_IMAGE}" \
            --push \
            --provenance=false \
            --metadata-file /tmp/build-metadata.json \
            docker/hello-world

          echo "=== Raw metadata ==="
          cat /tmp/build-metadata.json

          # Extract digest from metadata
          DIGEST=$(jq -r '."containerimage.digest"' /tmp/build-metadata.json)

          REPO="${ECR_REGISTRY}/${ECR_REPO}"
          IMAGE_REF="${REPO}@${DIGEST}"

          echo "=== Outputs ==="
          echo "full-image : ${FULL_IMAGE}"
          echo "digest     : ${DIGEST}"
          echo "image-ref  : ${IMAGE_REF}"

          # Write to GITHUB_OUTPUT
          echo "full-image=${FULL_IMAGE}" >> $GITHUB_OUTPUT
          echo "digest=${DIGEST}"         >> $GITHUB_OUTPUT
          echo "image-ref=${IMAGE_REF}"   >> $GITHUB_OUTPUT

      - name: Confirm outputs
        run: |
          echo "full-image : ${{ steps.push.outputs.full-image }}"
          echo "digest     : ${{ steps.push.outputs.digest }}"
          echo "image-ref  : ${{ steps.push.outputs.image-ref }}"
          test -n "${{ steps.push.outputs.image-ref }}" \
            || (echo "ERROR: image-ref output is empty" && exit 1)
          test -n "${{ steps.push.outputs.digest }}" \
            || (echo "ERROR: digest output is empty" && exit 1)

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 2 — SIGN
  # ───────────────────────────────────────────────────────────────────────────
  sign:
    name: Sign Image
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: aws

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: phase2-sign

      - name: Log in to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: v2.2.3

      - name: Sign image by digest (keyless)
        run: |
          IMAGE_REF="${{ needs.build-and-push.outputs.image-ref }}"
          echo "Signing: ${IMAGE_REF}"
          cosign sign --yes "${IMAGE_REF}"
          echo "✅ Signed"

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 3 — SBOM
  # Generates CycloneDX JSON with Syft, attaches as signed Cosign attestation.
  # predicateType=cyclonedx — verified by Kyverno Phase 3 policy.
  # ───────────────────────────────────────────────────────────────────────────
  sbom:
    name: Generate & Attest SBOM
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: aws

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: phase2-sbom

      - name: Log in to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: v2.2.3

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0
        with:
          syft-version: v0.105.1

      - name: Generate CycloneDX SBOM
        run: |
          IMAGE_REF="${{ needs.build-and-push.outputs.image-ref }}"
          echo "📋 Generating SBOM for: ${IMAGE_REF}"

          syft "${IMAGE_REF}" \
            --output cyclonedx-json=sbom.cdx.json

          echo "✅ SBOM generated"
          echo "   Spec version : $(jq -r '.specVersion' sbom.cdx.json)"
          echo "   Components   : $(jq '.components | length' sbom.cdx.json)"
          echo "─── Packages ───"
          jq -r '.components[] | "  \(.name) \(.version // "n/a")"' sbom.cdx.json

      - name: Attach SBOM as signed attestation
        run: |
          IMAGE_REF="${{ needs.build-and-push.outputs.image-ref }}"
          cosign attest --yes \
            --predicate sbom.cdx.json \
            --type cyclonedx \
            "${IMAGE_REF}"
          echo "✅ SBOM attestation attached"

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 4 — SLSA PROVENANCE
  # Generates SLSA v1.0 provenance JSON, attaches as signed Cosign attestation.
  # predicateType=slsaprovenance1 — verified by Kyverno Phase 3 policy.
  # builder.id is the specific workflow URL Kyverno will match against.
  # ───────────────────────────────────────────────────────────────────────────
  provenance:
    name: Generate & Attest SLSA Provenance
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: aws

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: phase2-provenance

      - name: Log in to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: v2.2.3

      - name: Generate SLSA v1.0 provenance predicate
        run: |
          BUILD_TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          FULL_IMAGE="${{ needs.build-and-push.outputs.full-image }}"

          python3 -c "
          import json, sys
          p = {
            'buildDefinition': {
              'buildType': 'https://slsa.dev/container-based-build/v0.1',
              'externalParameters': {
                'source': {
                  'uri': 'git+https://github.com/${{ github.repository }}@refs/heads/${{ github.ref_name }}',
                  'digest': {'gitCommit': '${{ github.sha }}'}
                },
                'image': '${FULL_IMAGE}'
              },
              'internalParameters': {
                'githubEventName':  '${{ github.event_name }}',
                'githubWorkflow':   '${{ github.workflow }}',
                'githubRunId':      '${{ github.run_id }}',
                'githubRunAttempt': '${{ github.run_attempt }}'
              },
              'resolvedDependencies': [{
                'uri': 'git+https://github.com/${{ github.repository }}@refs/heads/${{ github.ref_name }}',
                'digest': {'gitCommit': '${{ github.sha }}'}
              }]
            },
            'runDetails': {
              'builder': {
                'id': 'https://github.com/${{ github.repository }}/.github/workflows/phase2-pipeline.yml@refs/heads/${{ github.ref_name }}'
              },
              'metadata': {
                'invocationId': 'https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}/attempts/${{ github.run_attempt }}',
                'startedOn':  '${BUILD_TIMESTAMP}',
                'finishedOn': '${BUILD_TIMESTAMP}'
              }
            }
          }
          print(json.dumps(p, indent=2))
          " > provenance.json

          echo "✅ Provenance generated"
          echo "   Builder : $(jq -r '.runDetails.builder.id' provenance.json)"
          echo "   Commit  : ${{ github.sha }}"

      - name: Attach provenance as signed attestation
        run: |
          IMAGE_REF="${{ needs.build-and-push.outputs.image-ref }}"
          cosign attest --yes \
            --predicate provenance.json \
            --type slsaprovenance1 \
            "${IMAGE_REF}"
          echo "✅ Provenance attestation attached"

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 5 — VERIFY ALL
  # Verifies all 3 artefacts. cosign tree output = Phase 2 thesis evidence.
  # ───────────────────────────────────────────────────────────────────────────
  verify-all:
    name: Verify All Attestations
    runs-on: ubuntu-latest
    needs: [build-and-push, sign, sbom, provenance]
    environment: aws

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: phase2-verify

      - name: Log in to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: v2.2.3

      - name: Verify signature
        run: |
          cosign verify \
            --certificate-identity-regexp "https://github.com/${{ github.repository }}.*" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "${{ needs.build-and-push.outputs.image-ref }}"
          echo "✅ Signature verified"

      - name: Verify SBOM attestation
        run: |
          cosign verify-attestation \
            --certificate-identity-regexp "https://github.com/${{ github.repository }}.*" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            --type cyclonedx \
            "${{ needs.build-and-push.outputs.image-ref }}" \
            | jq -r '.payload | @base64d | fromjson |
                "✅ SBOM verified — predicateType: \(.predicateType)  components: \(.predicate.components | length)"'

      - name: Verify provenance attestation
        run: |
          cosign verify-attestation \
            --certificate-identity-regexp "https://github.com/${{ github.repository }}.*" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            --type slsaprovenance1 \
            "${{ needs.build-and-push.outputs.image-ref }}" \
            | jq -r '.payload | @base64d | fromjson |
                "✅ Provenance verified — builder: \(.predicate.runDetails.builder.id)"'

      - name: cosign tree — Phase 2 thesis evidence
        run: |
          echo "══════════════════════════════════════════════════════"
          echo "  Phase 2 — cosign tree (save this for thesis Chapter 5)"
          echo "  Expect: 1 signature + 1 SBOM + 1 provenance"
          echo "══════════════════════════════════════════════════════"
          cosign tree "${{ needs.build-and-push.outputs.image-ref }}"

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 6 — SMOKE TEST
  # ───────────────────────────────────────────────────────────────────────────
  smoke-test:
    name: Smoke Test — EKS
    runs-on: ubuntu-latest
    needs: [verify-all]
    environment: aws

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: phase2-smoke-test

      - name: Log in to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --region "${{ secrets.AWS_REGION }}" \
            --name "${{ secrets.EKS_CLUSTER_NAME }}"

      - name: Deploy ephemeral pod and verify
        run: |
          FULL_IMAGE="${{ needs.build-and-push.outputs.full-image }}"

          kubectl delete pod smoke-test --ignore-not-found
          sleep 3

          kubectl run smoke-test \
            --image="${FULL_IMAGE}" \
            --restart=Never \
            --command -- sh -c 'echo "Phase 2 smoke test passed on EKS"'

          sleep 15
          kubectl get pod smoke-test -o wide
          kubectl wait --for=jsonpath='{.status.phase}'=Succeeded \
            pod/smoke-test --timeout=90s

          kubectl logs smoke-test
          kubectl delete pod smoke-test --ignore-not-found
          echo "✅ Phase 2 complete"
