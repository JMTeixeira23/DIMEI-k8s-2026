name: Phase 2 — Sign + SBOM + Provenance (AWS)

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/phase2-pipeline.yml'
      - 'docker/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  actions: read

env:
  IMAGE_NAME: hello-world
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # JOB 1 — BUILD & PUSH
  # ───────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    environment: aws
    outputs:
      image-digest: ${{ steps.push.outputs.digest }}
      full-image:   ${{ steps.push.outputs.full-image }}
      image-ref:    ${{ steps.push.outputs.image-ref }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: phase2-build

      - name: Log in to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push to ECR
        id: push
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          ECR_REPO: ${{ secrets.ECR_REPO_NAME }}
        run: |
          FULL_IMAGE="${ECR_REGISTRY}/${ECR_REPO}:${IMAGE_TAG}"

          # Build and push — capture the digest from docker's output directly
          docker buildx build \
            --build-arg GIT_SHA="${IMAGE_TAG}" \
            --tag "${FULL_IMAGE}" \
            --push \
            --provenance=false \
            --output "type=image,push=true" \
            docker/hello-world

          # Pull the manifest to get the digest reliably
          docker pull "${FULL_IMAGE}"
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "${FULL_IMAGE}" | cut -d'@' -f2)

          REPO="${ECR_REGISTRY}/${ECR_REPO}"
          IMAGE_REF="${REPO}@${DIGEST}"

          echo "full-image=${FULL_IMAGE}" >> $GITHUB_OUTPUT
          echo "digest=${DIGEST}"         >> $GITHUB_OUTPUT
          echo "image-ref=${IMAGE_REF}"   >> $GITHUB_OUTPUT

          echo "✅ Pushed    : ${FULL_IMAGE}"
          echo "✅ Digest    : ${DIGEST}"
          echo "✅ Image ref : ${IMAGE_REF}"

      - name: Confirm outputs are set
        run: |
          echo "full-image : ${{ steps.push.outputs.full-image }}"
          echo "digest     : ${{ steps.push.outputs.digest }}"
          echo "image-ref  : ${{ steps.push.outputs.image-ref }}"
          # Fail fast if any output is empty
          test -n "${{ steps.push.outputs.image-ref }}" || (echo "ERROR: image-ref is empty" && exit 1)

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 2 — SIGN
  # Signs the image digest with Cosign keyless signing.
  # Certificate issued by Fulcio, entry recorded in Rekor transparency log.
  # ───────────────────────────────────────────────────────────────────────────
  sign:
    name: Sign Image
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: aws

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: phase2-sign

      - name: Log in to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: v2.2.3

      - name: Sign image by digest (keyless)
        env:
          IMAGE_REF: ${{ needs.build-and-push.outputs.image-ref }}
        run: |
          echo "Signing: ${IMAGE_REF}"
          cosign sign --yes "${IMAGE_REF}"
          echo "✅ Signed"

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 3 — SBOM
  # Generates a CycloneDX JSON SBOM with Syft and attaches it as a signed
  # Cosign attestation. predicateType=cyclonedx is what Kyverno checks (Phase 3).
  # ───────────────────────────────────────────────────────────────────────────
  sbom:
    name: Generate & Attest SBOM
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: aws

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: phase2-sbom

      - name: Log in to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: v2.2.3

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0
        with:
          syft-version: v0.105.1

      - name: Generate CycloneDX SBOM
        env:
          IMAGE_REF: ${{ needs.build-and-push.outputs.image-ref }}
        run: |
          echo "📋 Generating SBOM for: ${IMAGE_REF}"

          syft "${IMAGE_REF}" \
            --output cyclonedx-json=sbom.cdx.json

          echo "✅ SBOM generated"
          echo "   Spec version : $(jq -r '.specVersion' sbom.cdx.json)"
          echo "   Components   : $(jq '.components | length' sbom.cdx.json)"
          echo ""
          echo "─── Packages in image ───"
          jq -r '.components[] | "  \(.name) \(.version // "n/a")"' sbom.cdx.json

      - name: Attach SBOM as signed Cosign attestation
        env:
          IMAGE_REF: ${{ needs.build-and-push.outputs.image-ref }}
        run: |
          cosign attest --yes \
            --predicate sbom.cdx.json \
            --type cyclonedx \
            "${IMAGE_REF}"
          echo "✅ SBOM attestation attached (predicateType: cyclonedx)"

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 4 — SLSA PROVENANCE
  # Generates SLSA v1.0 provenance JSON and attaches it as a signed attestation.
  # Records: builder identity, source repo, commit SHA, workflow run details.
  # predicateType=slsaprovenance1 is what Kyverno checks (Phase 3).
  # ───────────────────────────────────────────────────────────────────────────
  provenance:
    name: Generate & Attest SLSA Provenance
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: aws

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: phase2-provenance

      - name: Log in to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: v2.2.3

      - name: Generate SLSA v1.0 provenance predicate
        env:
          IMAGE_REF:  ${{ needs.build-and-push.outputs.image-ref }}
          FULL_IMAGE: ${{ needs.build-and-push.outputs.full-image }}
          DIGEST:     ${{ needs.build-and-push.outputs.image-digest }}
        run: |
          BUILD_TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          # SLSA v1.0 provenance predicate
          # builder.id is what Kyverno Phase 3 policy matches against
          cat > provenance.json << EOF
          {
            "buildDefinition": {
              "buildType": "https://slsa.dev/container-based-build/v0.1",
              "externalParameters": {
                "source": {
                  "uri": "git+https://github.com/${{ github.repository }}@refs/heads/${{ github.ref_name }}",
                  "digest": { "gitCommit": "${{ github.sha }}" }
                },
                "image": "${FULL_IMAGE}"
              },
              "internalParameters": {
                "githubEventName":    "${{ github.event_name }}",
                "githubWorkflow":     "${{ github.workflow }}",
                "githubRunId":        "${{ github.run_id }}",
                "githubRunAttempt":   "${{ github.run_attempt }}"
              },
              "resolvedDependencies": [{
                "uri": "git+https://github.com/${{ github.repository }}@refs/heads/${{ github.ref_name }}",
                "digest": { "gitCommit": "${{ github.sha }}" }
              }]
            },
            "runDetails": {
              "builder": {
                "id": "https://github.com/${{ github.repository }}/.github/workflows/phase2-pipeline.yml@refs/heads/${{ github.ref_name }}"
              },
              "metadata": {
                "invocationId": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}/attempts/${{ github.run_attempt }}",
                "startedOn":  "${BUILD_TIMESTAMP}",
                "finishedOn": "${BUILD_TIMESTAMP}"
              }
            }
          }
          EOF

          echo "✅ Provenance predicate generated"
          echo "   Builder : https://github.com/${{ github.repository }}/.github/workflows/phase2-pipeline.yml@refs/heads/${{ github.ref_name }}"
          echo "   Commit  : ${{ github.sha }}"
          echo "   Run     : ${{ github.run_id }}"

      - name: Attach provenance as signed Cosign attestation
        env:
          IMAGE_REF: ${{ needs.build-and-push.outputs.image-ref }}
        run: |
          cosign attest --yes \
            --predicate provenance.json \
            --type slsaprovenance1 \
            "${IMAGE_REF}"
          echo "✅ Provenance attestation attached (predicateType: slsaprovenance1)"

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 5 — VERIFY ALL ATTESTATIONS
  # Confirms all 3 artefacts are present and valid.
  # cosign tree output here is the key Phase 2 thesis evidence.
  # ───────────────────────────────────────────────────────────────────────────
  verify-all:
    name: Verify All Attestations
    runs-on: ubuntu-latest
    needs: [build-and-push, sign, sbom, provenance]
    environment: aws

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: phase2-verify

      - name: Log in to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: v2.2.3

      - name: Verify signature
        env:
          IMAGE_REF: ${{ needs.build-and-push.outputs.image-ref }}
        run: |
          cosign verify \
            --certificate-identity-regexp "https://github.com/${{ github.repository }}.*" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "${IMAGE_REF}"
          echo "✅ Signature verified"

      - name: Verify SBOM attestation
        env:
          IMAGE_REF: ${{ needs.build-and-push.outputs.image-ref }}
        run: |
          cosign verify-attestation \
            --certificate-identity-regexp "https://github.com/${{ github.repository }}.*" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            --type cyclonedx \
            "${IMAGE_REF}" \
            | jq -r '.payload | @base64d | fromjson |
                "✅ SBOM verified — predicateType: \(.predicateType)  components: \(.predicate.components | length)"'

      - name: Verify provenance attestation
        env:
          IMAGE_REF: ${{ needs.build-and-push.outputs.image-ref }}
        run: |
          cosign verify-attestation \
            --certificate-identity-regexp "https://github.com/${{ github.repository }}.*" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            --type slsaprovenance1 \
            "${IMAGE_REF}" \
            | jq -r '.payload | @base64d | fromjson |
                "✅ Provenance verified — builder: \(.predicate.runDetails.builder.id)"'

      - name: Show full artefact tree (Phase 2 thesis evidence)
        env:
          IMAGE_REF: ${{ needs.build-and-push.outputs.image-ref }}
        run: |
          echo "══════════════════════════════════════════════════════"
          echo "  Phase 2 complete — cosign tree"
          echo "  Expect: 1 signature + 1 SBOM + 1 provenance"
          echo "══════════════════════════════════════════════════════"
          cosign tree "${IMAGE_REF}"

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 6 — SMOKE TEST
  # ───────────────────────────────────────────────────────────────────────────
  smoke-test:
    name: Smoke Test — EKS
    runs-on: ubuntu-latest
    needs: [verify-all]
    environment: aws

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: phase2-smoke-test

      - name: Log in to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --region "${{ secrets.AWS_REGION }}" \
            --name "${{ secrets.EKS_CLUSTER_NAME }}"

      - name: Deploy ephemeral pod and verify
        env:
          FULL_IMAGE: ${{ needs.build-and-push.outputs.full-image }}
        run: |
          kubectl delete pod smoke-test --ignore-not-found
          sleep 3

          kubectl run smoke-test \
            --image="${FULL_IMAGE}" \
            --restart=Never \
            --command -- sh -c 'echo "Phase 2 smoke test passed on EKS"'

          sleep 15
          kubectl get pod smoke-test -o wide
          kubectl wait --for=jsonpath='{.status.phase}'=Succeeded \
            pod/smoke-test --timeout=90s

          kubectl logs smoke-test
          kubectl delete pod smoke-test --ignore-not-found
          echo "✅ Phase 2 complete — signed + SBOM + provenance all attested"
