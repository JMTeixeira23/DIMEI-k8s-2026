name: Phase 2 — Sign + SBOM + Provenance (AWS)

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/phase2-pipeline.yml'
      - 'docker/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  actions: read

env:
  IMAGE_NAME: hello-world
  IMAGE_TAG: ${{ github.sha }}-${{ github.run_id }}

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # JOB 1 — BUILD & PUSH
  # Writes image references to image-ref.env artifact so all downstream
  # jobs can source it — avoids unreliable job output propagation.
  # ───────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    environment: aws

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: phase2-build

      - name: Log in to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push to ECR
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          ECR_REPO: ${{ secrets.ECR_REPO_NAME }}
        run: |
          FULL_IMAGE="${ECR_REGISTRY}/${ECR_REPO}:${IMAGE_TAG}"

          docker buildx build \
            --build-arg GIT_SHA="${IMAGE_TAG}" \
            --tag "${FULL_IMAGE}" \
            --push \
            --provenance=false \
            --metadata-file /tmp/build-metadata.json \
            docker/hello-world

          echo "=== Build metadata ==="
          cat /tmp/build-metadata.json

          DIGEST=$(jq -r '."containerimage.digest"' /tmp/build-metadata.json)
          REPO="${ECR_REGISTRY}/${ECR_REPO}"
          IMAGE_REF="${REPO}@${DIGEST}"

          echo "FULL_IMAGE=${FULL_IMAGE}" > image-ref.env
          echo "DIGEST=${DIGEST}"        >> image-ref.env
          echo "IMAGE_REF=${IMAGE_REF}"  >> image-ref.env

          echo "=== image-ref.env ==="
          cat image-ref.env

      - name: Upload image reference artifact
        uses: actions/upload-artifact@v4
        with:
          name: image-ref
          path: image-ref.env
          retention-days: 1

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 2 — SIGN
  # ───────────────────────────────────────────────────────────────────────────
  sign:
    name: Sign Image
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: aws

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: phase2-sign

      - name: Log in to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: v2.2.3

      - name: Download image reference
        uses: actions/download-artifact@v4
        with:
          name: image-ref

      - name: Sign image by digest (keyless)
        run: |
          source image-ref.env
          echo "Signing: ${IMAGE_REF}"
          cosign sign --yes "${IMAGE_REF}"
          echo "✅ Signed: ${IMAGE_REF}"

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 3 — SBOM
  # ───────────────────────────────────────────────────────────────────────────
  sbom:
    name: Generate & Attest SBOM
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: aws

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: phase2-sbom

      - name: Log in to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: v2.2.3

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0
        with:
          syft-version: v0.105.1

      - name: Download image reference
        uses: actions/download-artifact@v4
        with:
          name: image-ref

      - name: Generate CycloneDX SBOM
        run: |
          source image-ref.env
          echo "📋 Generating SBOM for: ${IMAGE_REF}"

          syft "${IMAGE_REF}" \
            --output cyclonedx-json=sbom.cdx.json

          echo "✅ SBOM generated"
          echo "   Spec version : $(jq -r '.specVersion' sbom.cdx.json)"
          echo "   Components   : $(jq '.components | length' sbom.cdx.json)"
          echo "─── Packages ───"
          jq -r '.components[] | "  \(.name) \(.version // "n/a")"' sbom.cdx.json

      - name: Attach SBOM as signed attestation
        run: |
          source image-ref.env
          cosign attest --yes \
            --predicate sbom.cdx.json \
            --type cyclonedx \
            "${IMAGE_REF}"
          echo "✅ SBOM attestation attached (predicateType: cyclonedx)"

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 4 — SLSA PROVENANCE
  # ───────────────────────────────────────────────────────────────────────────
  provenance:
    name: Generate & Attest SLSA Provenance
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: aws

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: phase2-provenance

      - name: Log in to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: v2.2.3

      - name: Download image reference
        uses: actions/download-artifact@v4
        with:
          name: image-ref

      - name: Generate SLSA v1.0 provenance predicate
        run: |
          source image-ref.env
          BUILD_TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          python3 << PYEOF
          import json

          provenance = {
            "buildDefinition": {
              "buildType": "https://slsa.dev/container-based-build/v0.1",
              "externalParameters": {
                "source": {
                  "uri": "git+https://github.com/${{ github.repository }}@refs/heads/${{ github.ref_name }}",
                  "digest": {"gitCommit": "${{ github.sha }}"}
                }
              },
              "internalParameters": {
                "githubEventName":  "${{ github.event_name }}",
                "githubWorkflow":   "${{ github.workflow }}",
                "githubRunId":      "${{ github.run_id }}",
                "githubRunAttempt": "${{ github.run_attempt }}"
              },
              "resolvedDependencies": [{
                "uri": "git+https://github.com/${{ github.repository }}@refs/heads/${{ github.ref_name }}",
                "digest": {"gitCommit": "${{ github.sha }}"}
              }]
            },
            "runDetails": {
              "builder": {
                "id": "https://github.com/${{ github.repository }}/.github/workflows/phase2-pipeline.yml@refs/heads/${{ github.ref_name }}"
              },
              "metadata": {
                "invocationId": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}/attempts/${{ github.run_attempt }}",
                "startedOn":  "${{ github.event.head_commit.timestamp }}",
                "finishedOn": "${{ github.event.head_commit.timestamp }}"
              }
            }
          }

          with open("provenance.json", "w") as f:
            json.dump(provenance, f, indent=2)

          print("✅ Provenance generated")
          print(f"   Builder: {provenance['runDetails']['builder']['id']}")
          PYEOF

      - name: Attach provenance as signed attestation
        run: |
          source image-ref.env
          cosign attest --yes \
            --predicate provenance.json \
            --type slsaprovenance1 \
            "${IMAGE_REF}"
          echo "✅ Provenance attestation attached (predicateType: slsaprovenance1)"

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 5 — VERIFY ALL
  # cosign tree output here is the Phase 2 thesis evidence
  # ───────────────────────────────────────────────────────────────────────────
  verify-all:
    name: Verify All Attestations
    runs-on: ubuntu-latest
    needs: [build-and-push, sign, sbom, provenance]
    environment: aws

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: phase2-verify

      - name: Log in to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: v2.2.3

      - name: Download image reference
        uses: actions/download-artifact@v4
        with:
          name: image-ref

      - name: Verify signature
        run: |
          source image-ref.env
          cosign verify \
            --certificate-identity-regexp "https://github.com/${{ github.repository }}.*" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "${IMAGE_REF}"
          echo "✅ Signature verified"

      - name: Verify SBOM attestation
        run: |
          source image-ref.env
          cosign verify-attestation \
            --certificate-identity-regexp "https://github.com/${{ github.repository }}.*" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            --type cyclonedx \
            "${IMAGE_REF}" \
            | jq -r '.payload | @base64d | fromjson |
                "✅ SBOM verified — predicateType: \(.predicateType)  components: \(.predicate.components | length)"'

      - name: Verify provenance attestation
        run: |
          source image-ref.env
          cosign verify-attestation \
            --certificate-identity-regexp "https://github.com/${{ github.repository }}.*" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            --type slsaprovenance1 \
            "${IMAGE_REF}" \
            | jq -r '.payload | @base64d | fromjson |
                "✅ Provenance verified — builder: \(.predicate.runDetails.builder.id)"'

      - name: cosign tree — Phase 2 thesis evidence
        run: |
          source image-ref.env
          echo "══════════════════════════════════════════════════════"
          echo "  Phase 2 — cosign tree (save this for Chapter 5)"
          echo "  Expected: 1 signature + 1 SBOM + 1 provenance"
          echo "══════════════════════════════════════════════════════"
          cosign tree "${IMAGE_REF}"

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 6 — SMOKE TEST
  # ───────────────────────────────────────────────────────────────────────────
  smoke-test:
    name: Smoke Test — EKS
    runs-on: ubuntu-latest
    needs: [verify-all]
    environment: aws

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: phase2-smoke-test

      - name: Log in to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --region "${{ secrets.AWS_REGION }}" \
            --name "${{ secrets.EKS_CLUSTER_NAME }}"

      - name: Download image reference
        uses: actions/download-artifact@v4
        with:
          name: image-ref

      - name: Deploy ephemeral pod and verify
        run: |
          source image-ref.env
          echo "Deploying: ${FULL_IMAGE}"

          kubectl delete pod smoke-test --ignore-not-found
          sleep 3

          kubectl run smoke-test \
            --image="${FULL_IMAGE}" \
            --restart=Never \
            --command -- sh -c 'echo "Phase 2 smoke test passed on EKS"'

          sleep 15
          kubectl get pod smoke-test -o wide
          kubectl wait --for=jsonpath='{.status.phase}'=Succeeded \
            pod/smoke-test --timeout=90s

          kubectl logs smoke-test
          kubectl delete pod smoke-test --ignore-not-found
          echo "✅ Phase 2 complete — signed + SBOM + provenance all attested"
