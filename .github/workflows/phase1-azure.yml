name: Phase 1 — Bootstrap Smoke Test (Azure)

on:
  push:
    branches: [main]
    paths:
      - 'docker/**'
      - '.github/workflows/phase1-azure.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build-sign-deploy:
    name: Build, Sign & Smoke Test (AKS)
    runs-on: ubuntu-latest
    environment: azure

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC — no static secrets)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: |
          az acr login --name "${{ secrets.ACR_LOGIN_SERVER }}"

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group "${{ secrets.AKS_RESOURCE_GROUP }}" \
            --name "${{ secrets.AKS_CLUSTER_NAME }}" \
            --overwrite-existing

      - name: Build and push image
        id: build
        env:
          REGISTRY: ${{ secrets.ACR_LOGIN_SERVER }}
          REPO: ${{ secrets.ACR_REPO_NAME }}
          TAG: ${{ github.sha }}
        run: |
          IMAGE="${REGISTRY}/${REPO}:${TAG}"

          docker build \
            --build-arg GIT_SHA="${{ github.sha }}" \
            -t "${IMAGE}" \
            docker/hello-world/

          docker push "${IMAGE}"

          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "${IMAGE}" \
            | cut -d'@' -f2)

          echo "IMAGE=${IMAGE}"   >> $GITHUB_ENV
          echo "DIGEST=${DIGEST}" >> $GITHUB_ENV
          echo "image=${IMAGE}"   >> $GITHUB_OUTPUT
          echo "digest=${DIGEST}" >> $GITHUB_OUTPUT
          echo "Built: ${IMAGE}@${DIGEST}"

      - name: Sign image (Cosign keyless)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign --yes "${IMAGE}@${DIGEST}"
          echo "✅ Signed: ${IMAGE}@${DIGEST}"

      - name: Verify signature
        run: |
          cosign verify \
            --certificate-identity-regexp \
              "https://github.com/JMTeixeira23/DIMEI-k8s-2026/.github/workflows/.*" \
            --certificate-oidc-issuer \
              "https://token.actions.githubusercontent.com" \
            "${IMAGE}@${DIGEST}"
          echo "✅ Signature verified"

      - name: Cosign tree
        run: cosign tree "${IMAGE}@${DIGEST}"

      - name: AKS smoke test
        run: |
          kubectl delete pod smoke-test --ignore-not-found
          sleep 3

          kubectl run smoke-test \
            --image="${IMAGE}@${DIGEST}" \
            --restart=Never \
            --command -- sh -c 'echo smoke-test-azure-ok'

          # Wait for completion
          kubectl wait pod/smoke-test \
            --for=jsonpath='{.status.phase}'=Succeeded \
            --timeout=60s 2>/dev/null || \
          kubectl wait pod/smoke-test \
            --for=jsonpath='{.status.phase}'=Failed \
            --timeout=30s 2>/dev/null || true

          PHASE=$(kubectl get pod smoke-test \
            -o jsonpath='{.status.phase}' 2>/dev/null || echo "Gone")

          if [ "${PHASE}" = "Succeeded" ] || [ "${PHASE}" = "Gone" ]; then
            echo "✅ Smoke test passed (phase=${PHASE})"
          else
            kubectl logs smoke-test 2>/dev/null || true
            echo "❌ Smoke test failed (phase=${PHASE})"
            exit 1
          fi

          kubectl delete pod smoke-test --ignore-not-found