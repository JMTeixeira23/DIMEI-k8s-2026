name: Phase 2 — Sign + SBOM + Provenance (Azure)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'docker/**'
      - '.github/workflows/phase2-azure.yml'

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    environment: azure
    outputs:
      image-tag: ${{ steps.build.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name "${{ secrets.ACR_LOGIN_SERVER }}"

      - name: Build and push
        id: build
        env:
          REGISTRY: ${{ secrets.ACR_LOGIN_SERVER }}
          REPO: ${{ secrets.ACR_REPO_NAME }}
        run: |
          TAG="${{ github.sha }}-${{ github.run_id }}"
          IMAGE="${REGISTRY}/${REPO}:${TAG}"

          docker build \
            --build-arg GIT_SHA="${{ github.sha }}" \
            -t "${IMAGE}" \
            docker/hello-world/

          docker push "${IMAGE}"

          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "${IMAGE}" \
            | cut -d'@' -f2)

          # Save for downstream jobs
          mkdir -p /tmp/refs
          echo "${IMAGE}@${DIGEST}" > /tmp/refs/image-ref.txt

          echo "IMAGE=${IMAGE}"   >> $GITHUB_ENV
          echo "DIGEST=${DIGEST}" >> $GITHUB_ENV
          echo "tag=${TAG}"       >> $GITHUB_OUTPUT
          echo "Built: ${IMAGE}@${DIGEST}"

      - name: Upload image reference
        uses: actions/upload-artifact@v4
        with:
          name: azure-image-ref
          path: /tmp/refs/image-ref.txt
          retention-days: 1

  # ── Parallel jobs: sign, sbom, provenance ────────────────────────────────

  sign:
    name: Sign Image
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: azure

    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name "${{ secrets.ACR_LOGIN_SERVER }}"

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Download image reference
        uses: actions/download-artifact@v4
        with:
          name: azure-image-ref
          path: /tmp/refs/

      - name: Sign image (keyless)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          IMAGE_REF=$(cat /tmp/refs/image-ref.txt)
          cosign sign --yes "${IMAGE_REF}"
          echo "✅ Signed: ${IMAGE_REF}"

  sbom:
    name: Generate & Attest SBOM
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: azure

    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name "${{ secrets.ACR_LOGIN_SERVER }}"

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Download image reference
        uses: actions/download-artifact@v4
        with:
          name: azure-image-ref
          path: /tmp/refs/

      - name: Generate and attest SBOM
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          IMAGE_REF=$(cat /tmp/refs/image-ref.txt)
          syft "${IMAGE_REF}" -o cyclonedx-json=/tmp/sbom.json
          echo "SBOM components: $(jq '.components | length' /tmp/sbom.json)"
          cosign attest --yes \
            --type cyclonedx \
            --predicate /tmp/sbom.json \
            "${IMAGE_REF}"
          echo "✅ SBOM attested"

  provenance:
    name: Generate & Attest Provenance
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: azure

    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name "${{ secrets.ACR_LOGIN_SERVER }}"

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Download image reference
        uses: actions/download-artifact@v4
        with:
          name: azure-image-ref
          path: /tmp/refs/

      - name: Generate and attest SLSA provenance
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          IMAGE_REF=$(cat /tmp/refs/image-ref.txt)

          python3 - << PYEOF
          import json, os, datetime
          prov = {
            "buildDefinition": {
              "buildType": "https://github.com/JMTeixeira23/DIMEI-k8s-2026/phase2-azure",
              "externalParameters": {
                "workflow": os.environ.get("GITHUB_WORKFLOW_REF", ""),
                "ref": os.environ.get("GITHUB_REF", ""),
                "cloud": "azure"
              }
            },
            "runDetails": {
              "builder": {
                "id": os.environ.get("GITHUB_WORKFLOW_REF", "")
              },
              "metadata": {
                "invocationId": os.environ.get("GITHUB_RUN_ID", ""),
                "startedOn": datetime.datetime.utcnow().isoformat() + "Z"
              }
            }
          }
          with open("/tmp/provenance.json", "w") as f:
              json.dump(prov, f, indent=2)
          print("Provenance generated")
          PYEOF

          cosign attest --yes \
            --type slsaprovenance1 \
            --predicate /tmp/provenance.json \
            "${IMAGE_REF}"
          echo "✅ Provenance attested"

  verify-all:
    name: Verify All Attestations
    runs-on: ubuntu-latest
    needs: [sign, sbom, provenance]
    environment: azure

    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name "${{ secrets.ACR_LOGIN_SERVER }}"

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Download image reference
        uses: actions/download-artifact@v4
        with:
          name: azure-image-ref
          path: /tmp/refs/

      - name: Verify signature + attestations
        run: |
          IMAGE_REF=$(cat /tmp/refs/image-ref.txt)
          CERT_ID="https://github.com/JMTeixeira23/DIMEI-k8s-2026/.github/workflows/phase2-azure.yml@refs/heads/main"
          CERT_ISSUER="https://token.actions.githubusercontent.com"

          echo "── Verify signature ──"
          cosign verify \
            --certificate-identity "${CERT_ID}" \
            --certificate-oidc-issuer "${CERT_ISSUER}" \
            "${IMAGE_REF}"

          echo "── Verify SBOM attestation ──"
          cosign verify-attestation \
            --type cyclonedx \
            --certificate-identity "${CERT_ID}" \
            --certificate-oidc-issuer "${CERT_ISSUER}" \
            "${IMAGE_REF}" | jq '.payload | @base64d | fromjson | .predicateType'

          echo "── Verify SLSA provenance ──"
          cosign verify-attestation \
            --type slsaprovenance1 \
            --certificate-identity "${CERT_ID}" \
            --certificate-oidc-issuer "${CERT_ISSUER}" \
            "${IMAGE_REF}" | jq '.payload | @base64d | fromjson | .predicateType'

          echo "── Cosign tree ──"
          cosign tree "${IMAGE_REF}"

          echo "✅ All attestations verified"

  smoke-test:
    name: AKS Smoke Test
    runs-on: ubuntu-latest
    needs: verify-all
    environment: azure

    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group "${{ secrets.AKS_RESOURCE_GROUP }}" \
            --name "${{ secrets.AKS_CLUSTER_NAME }}" \
            --overwrite-existing

      - name: Log in to ACR
        run: az acr login --name "${{ secrets.ACR_LOGIN_SERVER }}"

      - name: Download image reference
        uses: actions/download-artifact@v4
        with:
          name: azure-image-ref
          path: /tmp/refs/

      - name: Smoke test on AKS
        run: |
          IMAGE_REF=$(cat /tmp/refs/image-ref.txt)

          kubectl delete pod smoke-test-p2 --ignore-not-found
          sleep 3

          kubectl run smoke-test-p2 \
            --image="${IMAGE_REF}" \
            --restart=Never \
            --command -- sh -c 'echo phase2-azure-smoke-ok'

          kubectl wait pod/smoke-test-p2 \
            --for=jsonpath='{.status.phase}'=Succeeded \
            --timeout=60s 2>/dev/null || true

          PHASE=$(kubectl get pod smoke-test-p2 \
            -o jsonpath='{.status.phase}' 2>/dev/null || echo "Gone")

          [ "${PHASE}" = "Succeeded" ] || [ "${PHASE}" = "Gone" ] && \
            echo "✅ Phase 2 Azure smoke test passed" || \
            { echo "❌ Failed: ${PHASE}"; exit 1; }

          kubectl delete pod smoke-test-p2 --ignore-not-found
