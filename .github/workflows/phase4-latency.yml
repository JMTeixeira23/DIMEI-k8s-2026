name: Phase 4 — Latency & Overhead Measurement (AWS)

on:
  workflow_dispatch:
    inputs:
      iterations:
        description: 'Number of pods per test run (recommend 30)'
        required: true
        default: '30'
        type: string

permissions:
  id-token: write
  contents: read
  actions: read   # needed for GitHub API workflow run queries

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # JOB 1 — CI PIPELINE DURATION
  # ───────────────────────────────────────────────────────────────────────────
  pipeline-duration:
    name: Measure CI Pipeline Overhead
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Measure pipeline durations via GitHub API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          echo "════════════════════════════════════════════════════"
          echo "  Phase 4 — CI Pipeline Duration Comparison"
          echo "════════════════════════════════════════════════════"

          echo "── Phase 1 (phase1-bootstrap.yml) ──"
          gh api \
            "repos/${REPO}/actions/workflows/phase1-bootstrap.yml/runs?status=success&per_page=10" \
            --jq '.workflow_runs[] | {run_number,duration_seconds:((.updated_at|fromdateiso8601)-(.created_at|fromdateiso8601)),created_at}' \
            > /tmp/phase1-runs.json 2>&1 || echo "No Phase 1 runs found yet"
          cat /tmp/phase1-runs.json

          echo ""
          echo "── Phase 2 (phase2-pipeline.yml) ──"
          gh api \
            "repos/${REPO}/actions/workflows/phase2-pipeline.yml/runs?status=success&per_page=10" \
            --jq '.workflow_runs[] | {run_number,duration_seconds:((.updated_at|fromdateiso8601)-(.created_at|fromdateiso8601)),created_at}' \
            > /tmp/phase2-runs.json 2>&1 || echo "No Phase 2 runs found yet"
          cat /tmp/phase2-runs.json

          echo ""
          echo "── Summary ──"
          python3 << 'PYEOF'
          import json, os

          def avg(path):
              try:
                  vals = [json.loads(l)["duration_seconds"]
                          for l in open(path) if l.strip() and "{" in l]
                  return sum(vals)/len(vals) if vals else 0, len(vals)
              except:
                  return 0, 0

          p1_avg, p1_n = avg('/tmp/phase1-runs.json')
          p2_avg, p2_n = avg('/tmp/phase2-runs.json')
          overhead = p2_avg - p1_avg
          pct = (overhead / p1_avg * 100) if p1_avg > 0 else 0

          if p1_n == 0 and p2_n == 0:
              print("No run data yet — run Phase 1 and Phase 2 workflows first")
          else:
              print(f"Phase 1 avg duration : {p1_avg:.0f}s ({p1_avg/60:.1f}min) [n={p1_n}]")
              print(f"Phase 2 avg duration : {p2_avg:.0f}s ({p2_avg/60:.1f}min) [n={p2_n}]")
              print(f"Security overhead    : +{overhead:.0f}s (+{pct:.1f}%)")
              print("")
              print("CSV:")
              print("workflow,avg_s,avg_min,n")
              print(f"phase1,{p1_avg:.0f},{p1_avg/60:.1f},{p1_n}")
              print(f"phase2,{p2_avg:.0f},{p2_avg/60:.1f},{p2_n}")
              print(f"overhead,{overhead:.0f},{overhead/60:.1f},")
          PYEOF

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 2 — ECR STORAGE OVERHEAD
  # ───────────────────────────────────────────────────────────────────────────
  ecr-storage:
    name: Measure ECR Storage Overhead
    runs-on: ubuntu-latest
    environment: aws

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: phase4-storage

      - name: Measure ECR image and artefact sizes
        env:
          ECR_REPO: ${{ secrets.ECR_REPO_NAME }}
        run: |
          echo "════════════════════════════════════════════════════"
          echo "  Phase 4 — ECR Storage Overhead"
          echo "════════════════════════════════════════════════════"

          aws ecr describe-images \
            --repository-name "${ECR_REPO}" \
            --region "${{ secrets.AWS_REGION }}" \
            --output json > /tmp/ecr-images.json

          python3 << 'PYEOF'
          import json

          data   = json.load(open('/tmp/ecr-images.json'))
          images = data["imageDetails"]

          real, sigs, atts = [], [], []
          for img in images:
              tags = img.get("imageTags", [])
              size = img.get("imageSizeInBytes", 0)
              if not tags: continue
              tag = tags[0]
              if tag.endswith(".sig"):   sigs.append(size)
              elif tag.endswith(".att"): atts.append(size)
              elif "-" in tag and not tag.startswith("sha256"): real.append(size)

          def fmt(b):
              if b > 1024*1024: return f"{b/1024/1024:.2f} MB"
              if b > 1024:      return f"{b/1024:.2f} KB"
              return f"{b} B"

          avg_img = sum(real)/max(len(real),1)
          avg_sig = sum(sigs)/max(len(sigs),1)
          avg_att = sum(atts)/max(len(atts),1)
          total   = avg_sig + avg_att * 2
          pct     = total/avg_img*100 if avg_img else 0

          print(f"Real images     : {len(real)}  avg {fmt(avg_img)}")
          print(f"Signatures      : {len(sigs)}  avg {fmt(avg_sig)}")
          print(f"Attestations    : {len(atts)}  avg {fmt(avg_att)}")
          print(f"Total overhead  : {fmt(total)} per image ({pct:.1f}%)")
          print("")
          print("CSV:")
          print("type,avg_bytes,avg_human,count")
          print(f"base_image,{avg_img:.0f},{fmt(avg_img)},{len(real)}")
          print(f"signature,{avg_sig:.0f},{fmt(avg_sig)},{len(sigs)}")
          print(f"attestation,{avg_att:.0f},{fmt(avg_att)},{len(atts)}")
          print(f"total_overhead,{total:.0f},{fmt(total)},")
          PYEOF

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 3 — ADMISSION LATENCY
  # Three conditions: baseline (no policies), audit, enforce.
  # Baseline achieved by deleting policies then restoring them — the only
  # reliable method since verifyImages policies cannot have admission disabled.
  # ───────────────────────────────────────────────────────────────────────────
  admission-latency:
    name: Measure Admission Latency
    runs-on: ubuntu-latest
    environment: aws

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: phase4-latency

      - name: Log in to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region "${{ secrets.AWS_REGION }}" \
            --name "${{ secrets.EKS_CLUSTER_NAME }}"

      - name: Get latest signed image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          ECR_REPO: ${{ secrets.ECR_REPO_NAME }}
        run: |
          LATEST_TAG=$(aws ecr describe-images \
            --repository-name "${ECR_REPO}" \
            --region "${{ secrets.AWS_REGION }}" \
            --output json \
            | jq -r '
                .imageDetails
                | map(select(.imageTags != null))
                | map(select(.imageTags[] | test("^sha256") | not))
                | map(select(.imageTags[] | test("-")))
                | sort_by(.imagePushedAt)
                | last
                | .imageTags[0]
              ')
          SIGNED_IMAGE="${ECR_REGISTRY}/${ECR_REPO}:${LATEST_TAG}"
          echo "SIGNED_IMAGE=${SIGNED_IMAGE}" >> $GITHUB_ENV
          echo "Using image: ${SIGNED_IMAGE}"

      - name: Setup measurement namespace
        run: |
          kubectl create namespace phase4-latency \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Save policy manifests for restore
        run: |
          kubectl get clusterpolicy verify-image-signature -o yaml \
            > /tmp/policy-signature.yaml
          kubectl get clusterpolicy verify-sbom-cyclonedx -o yaml \
            > /tmp/policy-sbom.yaml
          kubectl get clusterpolicy verify-slsa-provenance -o yaml \
            > /tmp/policy-provenance.yaml
          echo "✅ Policies saved"

      - name: Run latency measurements
        env:
          ITERATIONS: ${{ github.event.inputs.iterations }}
        run: |
          N="${ITERATIONS:-30}"
          echo "Running ${N} iterations per condition"

          # Timing function — measures kubectl API round-trip per pod
          measure() {
            CONDITION=$1 IMAGE=$2 OUTFILE=$3
            echo "condition,pod_index,admission_ms" > "${OUTFILE}"
            for i in $(seq 1 $N); do
              POD="lat-${CONDITION}-${i}"
              kubectl delete pod "${POD}" -n phase4-latency \
                --ignore-not-found --wait=false 2>/dev/null
              START=$(date +%s%3N)
              kubectl run "${POD}" \
                --image="${IMAGE}" \
                --restart=Never \
                --namespace=phase4-latency \
                --command -- sh -c 'exit 0' > /dev/null 2>&1
              END=$(date +%s%3N)
              MS=$((END - START))
              echo "${CONDITION},${i},${MS}" >> "${OUTFILE}"
              echo "  ${CONDITION} ${i}/${N}: ${MS}ms"
              sleep 1
            done
          }

          # ── BASELINE: delete all policies ──
          echo "════ BASELINE — deleting policies ════"
          kubectl delete clusterpolicy \
            verify-image-signature \
            verify-sbom-cyclonedx \
            verify-slsa-provenance \
            --ignore-not-found
          sleep 10

          measure "baseline" "${SIGNED_IMAGE}" /tmp/baseline.csv

          # ── AUDIT: restore policies in Audit mode ──
          echo "════ AUDIT — restoring policies in Audit mode ════"
          # Patch mode to Audit before applying
          for f in /tmp/policy-signature.yaml /tmp/policy-sbom.yaml /tmp/policy-provenance.yaml; do
            sed 's/validationFailureAction: Enforce/validationFailureAction: Audit/' \
              "${f}" | kubectl apply -f - 2>/dev/null || true
          done
          # Also patch mutateDigest for Audit compatibility
          kubectl patch clusterpolicy verify-image-signature \
            --type=merge -p '{"spec":{"rules":[{"name":"check-image-signature","verifyImages":[{"mutateDigest":false,"verifyDigest":false}]}]}}' \
            2>/dev/null || true
          sleep 10

          measure "audit" "${SIGNED_IMAGE}" /tmp/audit.csv

          # ── ENFORCE: switch to Enforce mode ──
          echo "════ ENFORCE — switching to Enforce mode ════"
          for f in /tmp/policy-signature.yaml /tmp/policy-sbom.yaml /tmp/policy-provenance.yaml; do
            kubectl apply -f "${f}" 2>/dev/null || true
          done
          sleep 10

          measure "enforce" "${SIGNED_IMAGE}" /tmp/enforce.csv

          echo "✅ Measurements complete — cluster in Enforce mode"

      - name: Analyse results
        run: |
          python3 << 'PYEOF'
          import csv, statistics, os

          def load(path):
              if not os.path.exists(path): return []
              with open(path) as f:
                  return [int(r["admission_ms"]) for r in csv.DictReader(f)]

          baseline = load("/tmp/baseline.csv")
          audit    = load("/tmp/audit.csv")
          enforce  = load("/tmp/enforce.csv")

          def stats(label, data):
              if not data:
                  print(f"{label}: no data"); return
              s = sorted(data)
              print(f"{label} (n={len(data)}):")
              print(f"  mean   = {statistics.mean(data):.0f} ms")
              print(f"  median = {statistics.median(data):.0f} ms")
              print(f"  stdev  = {statistics.stdev(data):.0f} ms")
              print(f"  min    = {min(data)} ms")
              print(f"  max    = {max(data)} ms")
              print(f"  p95    = {s[int(len(s)*0.95)]} ms")

          print("════════════════════════════════════════════════════")
          print("  Phase 4 — Admission Latency Results")
          print("  Save this output for thesis Chapter 6")
          print("════════════════════════════════════════════════════")
          stats("Baseline (no policies)", baseline)
          print("")
          stats("Audit mode", audit)
          print("")
          stats("Enforce mode", enforce)

          if baseline and enforce:
              overhead = statistics.mean(enforce) - statistics.mean(baseline)
              pct = overhead / statistics.mean(baseline) * 100
              print(f"\nKyverno overhead: +{overhead:.0f}ms ({pct:.1f}%)")

          print("\nCSV (copy into thesis table):")
          print("condition,n,mean_ms,median_ms,stdev_ms,min_ms,max_ms,p95_ms")
          for label, data in [("baseline",baseline),("audit",audit),("enforce",enforce)]:
              if data:
                  s = sorted(data)
                  p95 = s[int(len(s)*0.95)]
                  print(f"{label},{len(data)},{statistics.mean(data):.0f},{statistics.median(data):.0f},{statistics.stdev(data):.0f},{min(data)},{max(data)},{p95}")
          PYEOF

      - name: Upload raw timing data
        uses: actions/upload-artifact@v4
        with:
          name: latency-results
          path: |
            /tmp/baseline.csv
            /tmp/audit.csv
            /tmp/enforce.csv
          retention-days: 30

      - name: Cleanup
        if: always()
        run: |
          kubectl delete pods -n phase4-latency --all --ignore-not-found
          echo "✅ Cleanup complete"