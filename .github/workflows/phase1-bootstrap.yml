name: Phase 1 — Bootstrap Smoke Test (AWS)

on:
  push:
    branches: [main]
    paths:
      - 'terraform/aws/**'
      - '.github/workflows/phase1-bootstrap.yml'
      - 'docker/**'
  workflow_dispatch:

# ─────────────────────────────────────────────────────────────────────────────
# OIDC permissions
# id-token:write is what allows GitHub to mint a short-lived OIDC token.
# This token is exchanged for AWS credentials via AssumeRoleWithWebIdentity.
# No long-lived secrets are stored. When Azure is added, the same token is
# exchanged for an Azure access token via Entra Workload Identity.
# ─────────────────────────────────────────────────────────────────────────────
permissions:
  id-token: write
  contents: read

env:
  IMAGE_NAME: hello-world
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # BUILD — produces the image once; cloud-specific push jobs consume it
  # ───────────────────────────────────────────────────────────────────────────
  build:
    name: Build Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: docker/hello-world
          push: false
          load: true
          tags: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          build-args: |
            GIT_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker,dest=/tmp/image.tar

      - name: Upload image tarball
        uses: actions/upload-artifact@v4
        with:
          name: image-tar
          path: /tmp/image.tar
          retention-days: 1

  # ───────────────────────────────────────────────────────────────────────────
  # AWS SMOKE TEST — ECR push → Cosign sign → verify → EKS deploy
  #
  # Future: an equivalent `smoke-test-azure` job goes here with:
  #   - azure/login@v1 (OIDC, no secrets)
  #   - az acr login
  #   - same cosign sign/verify steps
  #   - az aks get-credentials + kubectl run
  # The sign/verify steps are identical between clouds — only registry auth differs.
  # ───────────────────────────────────────────────────────────────────────────
  smoke-test-aws:
    name: Smoke Test — ECR + EKS
    runs-on: ubuntu-latest
    needs: build
    environment: aws

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Exchange GitHub OIDC token for temporary AWS credentials — no secrets stored
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: phase1-smoke-test

      - name: Log in to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Download image tarball
        uses: actions/download-artifact@v4
        with:
          name: image-tar
          path: /tmp

      - name: Tag, push and capture digest
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          ECR_REPO: ${{ secrets.ECR_REPO_NAME }}
        run: |
          FULL_IMAGE="${ECR_REGISTRY}/${ECR_REPO}:${IMAGE_TAG}"
          docker load --input /tmp/image.tar
          docker tag "${IMAGE_NAME}:${IMAGE_TAG}" "${FULL_IMAGE}"
          docker push "${FULL_IMAGE}"

          # Capture digest so Cosign signs the exact image bytes, not just the tag.
          # This avoids the ECR immutable tag conflict on re-runs (the .sig tag already
          # exists for this digest, and immutable repos block overwriting it).
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "${FULL_IMAGE}")
          echo "FULL_IMAGE=${FULL_IMAGE}" >> $GITHUB_ENV
          echo "IMAGE_DIGEST=${DIGEST}" >> $GITHUB_ENV
          echo "✅ Pushed : ${FULL_IMAGE}"
          echo "✅ Digest : ${DIGEST}"

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: v2.2.3

      # Keyless signing: Cosign obtains a Fulcio certificate for the GitHub
      # Actions OIDC identity. The certificate and signature are recorded in
      # the Sigstore transparency log (Rekor). No private key is stored anywhere.
      # Signing by digest (not tag) is the correct approach — it binds the
      # signature to the exact image bytes and avoids immutable tag conflicts.
      - name: Sign image (Cosign keyless, by digest)
        run: |
          cosign sign --yes "${IMAGE_DIGEST}"
          echo "✅ Image signed"

      - name: Verify signature
        run: |
          cosign verify \
            --certificate-identity-regexp "https://github.com/${{ github.repository }}.*" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "${IMAGE_DIGEST}"
          echo "✅ Signature verified"

      - name: Show artefacts in registry (cosign tree)
        run: |
          echo "─── cosign tree output (Phase 2 will add SBOM + provenance here) ───"
          cosign tree "${IMAGE_DIGEST}"

      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --region "${{ secrets.AWS_REGION }}" \
            --name "${{ secrets.EKS_CLUSTER_NAME }}"

      - name: Smoke test — deploy ephemeral pod and confirm execution
        run: |
          # Use the tag for the pod image reference (EKS pulls by tag from ECR)
          kubectl run smoke-test \
            --image="${FULL_IMAGE}" \
            --restart=Never \
            --command -- sh -c 'echo "Phase 1 smoke test passed on EKS"'
          kubectl wait --for=condition=Succeeded pod/smoke-test --timeout=90s
          kubectl logs smoke-test
          kubectl delete pod smoke-test
          echo "✅ Smoke test complete"