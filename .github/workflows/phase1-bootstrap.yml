name: Phase 1 — Bootstrap Smoke Test (AWS)

on:
  push:
    branches: [main]
    paths:
      - 'docker/**'
      - '.github/workflows/phase1-bootstrap.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  IMAGE_NAME: hello-world
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build:
    name: Build Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: docker/hello-world
          push: false
          load: true
          tags: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          build-args: |
            GIT_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker,dest=/tmp/image.tar

      - name: Upload image tarball
        uses: actions/upload-artifact@v4
        with:
          name: image-tar
          path: /tmp/image.tar
          retention-days: 1

  smoke-test-aws:
    name: Smoke Test — ECR + EKS
    runs-on: ubuntu-latest
    needs: build
    environment: aws

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: phase1-smoke-test

      - name: Log in to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Download image tarball
        uses: actions/download-artifact@v4
        with:
          name: image-tar
          path: /tmp

      - name: Tag, push and capture digest
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          ECR_REPO: ${{ secrets.ECR_REPO_NAME }}
        run: |
          FULL_IMAGE="${ECR_REGISTRY}/${ECR_REPO}:${IMAGE_TAG}"
          docker load --input /tmp/image.tar
          docker tag "${IMAGE_NAME}:${IMAGE_TAG}" "${FULL_IMAGE}"
          docker push "${FULL_IMAGE}"
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "${FULL_IMAGE}")
          echo "FULL_IMAGE=${FULL_IMAGE}" >> $GITHUB_ENV
          echo "IMAGE_DIGEST=${DIGEST}" >> $GITHUB_ENV
          echo "Pushed : ${FULL_IMAGE}"
          echo "Digest : ${DIGEST}"

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: v2.2.3

      - name: Sign image (Cosign keyless, by digest)
        run: |
          cosign sign --yes "${IMAGE_DIGEST}"
          echo "Image signed"

      - name: Verify signature
        run: |
          cosign verify \
            --certificate-identity-regexp "https://github.com/${{ github.repository }}.*" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "${IMAGE_DIGEST}"
          echo "Signature verified"

      - name: Show artefacts in registry (cosign tree)
        run: |
          echo "--- cosign tree output (Phase 2 will add SBOM + provenance here) ---"
          cosign tree "${IMAGE_DIGEST}"

      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --region "${{ secrets.AWS_REGION }}" \
            --name "${{ secrets.EKS_CLUSTER_NAME }}"

      - name: Smoke test — deploy ephemeral pod and confirm execution
        run: |
          # Delete any leftover pod and wait until fully gone before creating new one
          kubectl delete pod smoke-test --ignore-not-found
          kubectl wait pod/smoke-test --for=delete --timeout=60s 2>/dev/null || true

          kubectl run smoke-test \
            --image="${FULL_IMAGE}" \
            --restart=Never \
            --command -- sh -c 'echo "Phase 1 smoke test passed on EKS"'

          sleep 15
          echo "--- Pod status ---"
          kubectl get pod smoke-test -o wide
          echo "--- Pod events (look for image pull errors here) ---"
          kubectl describe pod smoke-test | grep -A 20 "Events:"

          # Pod may already be Completed before wait runs — poll phase directly
          for i in $(seq 1 30); do
            PHASE=$(kubectl get pod smoke-test \
              -o jsonpath='{.status.phase}' 2>/dev/null || echo "Pending")
            echo "  pod phase: ${PHASE}"
            if [ "${PHASE}" = "Succeeded" ]; then
              echo "✅ Smoke test passed"
              break
            elif [ "${PHASE}" = "Failed" ]; then
              echo "❌ Smoke test failed"
              kubectl logs smoke-test || true
              exit 1
            fi
            [ "${i}" = "30" ] && echo "❌ Timed out" && exit 1
            sleep 3
          done

          kubectl logs smoke-test || true
          kubectl delete pod smoke-test --ignore-not-found
          echo "Smoke test complete"

  call-phase2:
    name: Trigger Phase 2 (Sign + SBOM + Provenance)
    needs: smoke-test-aws      # only after smoke test passes
    uses: ./.github/workflows/phase2-pipeline.yml
    secrets: inherit