name: Phase 3 — Kyverno Policies (Azure)

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Policy enforcement mode"
        required: true
        default: "Enforce"
        type: choice
        options: [Audit, Enforce]

permissions:
  id-token: write
  contents: read

jobs:
  apply-policies:
    name: Apply ClusterPolicies
    runs-on: ubuntu-latest
    environment: azure

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group "${{ secrets.AKS_RESOURCE_GROUP }}" \
            --name "${{ secrets.AKS_CLUSTER_NAME }}" \
            --overwrite-existing

      - name: Set policy mode (${{ github.event.inputs.mode }})
        env:
          MODE: ${{ github.event.inputs.mode }}
        run: |
          for f in kyverno/azure/verify-image-signature.yaml \
                   kyverno/azure/verify-sbom-cyclonedx.yaml \
                   kyverno/azure/verify-slsa-provenance.yaml; do
            sed -i "s/validationFailureAction: .*/validationFailureAction: ${MODE}/" "$f"
            if [ "${MODE}" = "Audit" ]; then
              sed -i "s/mutateDigest: .*/mutateDigest: false/" "$f"
              sed -i "s/verifyDigest: .*/verifyDigest: false/" "$f"
            else
              sed -i "s/mutateDigest: .*/mutateDigest: true/" "$f"
              sed -i "s/verifyDigest: .*/verifyDigest: true/" "$f"
            fi
            echo "  ✅ ${f} → ${MODE}"
          done

      - name: Apply ClusterPolicies
        run: |
          kubectl apply --server-side --force-conflicts \
            -f kyverno/azure/verify-image-signature.yaml
          kubectl apply --server-side --force-conflicts \
            -f kyverno/azure/verify-sbom-cyclonedx.yaml
          kubectl apply --server-side --force-conflicts \
            -f kyverno/azure/verify-slsa-provenance.yaml

          echo ""
          kubectl get clusterpolicies -o wide

  test-policies:
    name: Policy Test Matrix
    runs-on: ubuntu-latest
    needs: apply-policies
    environment: azure

    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group "${{ secrets.AKS_RESOURCE_GROUP }}" \
            --name "${{ secrets.AKS_CLUSTER_NAME }}" \
            --overwrite-existing

      - name: Log in to ACR
        run: az acr login --name "${{ secrets.ACR_LOGIN_SERVER }}"

      - name: Get latest signed image
        env:
          ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
          ACR_REPO_NAME: ${{ secrets.ACR_REPO_NAME }}
        run: |
          LATEST_TAG=$(az acr repository show-tags \
            --name "${ACR_LOGIN_SERVER%%.*}" \
            --repository "${ACR_REPO_NAME}" \
            --orderby time_desc \
            --output tsv \
            | grep -E '^[a-f0-9]+-[0-9]+$' \
            | grep -vE '^(attack|size-)' \
            | head -1)

          IMAGE="${ACR_LOGIN_SERVER}/${ACR_REPO_NAME}:${LATEST_TAG}"
          echo "SIGNED_IMAGE=${IMAGE}" >> $GITHUB_ENV
          echo "Latest signed image: ${IMAGE}"

      - name: TC-01 — Signed image (ADMIT)
        run: |
          echo "════════════════════════════════════════"
          echo "TC-01: Signed image with SBOM + provenance"
          echo "Expected: ADMITTED"
          echo "════════════════════════════════════════"

          kubectl delete pod tc-01 -n supply-chain-demo --ignore-not-found
          sleep 2

          OUTPUT=$(kubectl run tc-01 \
            --image="${SIGNED_IMAGE}" \
            --restart=Never \
            --namespace=supply-chain-demo \
            --command -- sh -c 'echo tc-01-azure-ok' 2>&1) && ADMITTED=true || ADMITTED=false

          echo "${OUTPUT}"
          if [ "${ADMITTED}" = "true" ]; then
            echo "✅ TC-01 PASS — signed image was ADMITTED"
            kubectl delete pod tc-01 -n supply-chain-demo --ignore-not-found
          else
            echo "❌ TC-01 FAIL — signed image was unexpectedly BLOCKED"
            exit 1
          fi

      - name: TC-02 — nginx (BLOCK)
        run: |
          echo "════════════════════════════════════════"
          echo "TC-02: nginx (non-ACR image)"
          echo "Expected: BLOCKED"
          echo "════════════════════════════════════════"

          kubectl delete pod tc-02 -n supply-chain-demo --ignore-not-found
          sleep 2

          OUTPUT=$(kubectl run tc-02 \
            --image=nginx:latest \
            --restart=Never \
            --namespace=supply-chain-demo \
            --command -- sh -c 'echo tc-02' 2>&1) && ADMITTED=true || ADMITTED=false

          echo "${OUTPUT}"
          if [ "${ADMITTED}" = "false" ]; then
            echo "✅ TC-02 PASS — non-ACR image was BLOCKED"
          else
            echo "❌ TC-02 FAIL — nginx was admitted (registry block not working)"
            kubectl delete pod tc-02 -n supply-chain-demo --ignore-not-found
            exit 1
          fi

      - name: TC-03 — alpine (BLOCK)
        run: |
          echo "════════════════════════════════════════"
          echo "TC-03: alpine (non-ACR image)"
          echo "Expected: BLOCKED"
          echo "════════════════════════════════════════"

          kubectl delete pod tc-03 -n supply-chain-demo --ignore-not-found
          sleep 2

          OUTPUT=$(kubectl run tc-03 \
            --image=alpine:latest \
            --restart=Never \
            --namespace=supply-chain-demo \
            --command -- sh -c 'echo tc-03' 2>&1) && ADMITTED=true || ADMITTED=false

          echo "${OUTPUT}"
          if [ "${ADMITTED}" = "false" ]; then
            echo "✅ TC-03 PASS — alpine was BLOCKED"
          else
            echo "❌ TC-03 FAIL"
            kubectl delete pod tc-03 -n supply-chain-demo --ignore-not-found
            exit 1
          fi

      - name: Policy summary
        if: always()
        run: kubectl describe clusterpolicies | grep -E "Name:|Action:|Ready:"
