name: Supply Chain Security Pipeline

# Unified CD pipeline — runs on AWS EKS and Azure AKS in parallel via matrix.
#
# The only cloud-specific steps are auth, registry login, and kubeconfig.
# Everything from signing through policy enforcement is identical on both clouds.
#
# Triggered automatically when docker/ changes. Can also be run manually
# to target a specific cloud or to verify the pipeline after infrastructure changes.

on:
  push:
    branches: [main]
    paths:
      - 'docker/**'
  workflow_dispatch:
    inputs:
      cloud:
        description: 'Which cloud(s) to run on'
        required: true
        default: 'both'
        type: choice
        options:
          - both
          - aws
          - azure

permissions:
  id-token: write   # needed for OIDC auth to AWS/Azure and for Cosign keyless signing
  contents: read
  actions: read

env:
  IMAGE_TAG: ${{ github.sha }}-${{ github.run_id }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  supply-chain:
    name: Supply Chain (${{ matrix.cloud }})
    runs-on: ubuntu-latest
    environment: ${{ matrix.cloud }}

    strategy:
      fail-fast: false   # keep the other cloud running if one fails
      matrix:
        include:
          - cloud: aws
          - cloud: azure

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # Skip this leg if the user selected a specific cloud on manual trigger.
      # On push, both legs always run.
      - name: Check cloud selection
        run: |
          SELECTED="${{ inputs.cloud }}"
          THIS="${{ matrix.cloud }}"
          if [ -n "${SELECTED}" ] && [ "${SELECTED}" != "both" ] && [ "${SELECTED}" != "${THIS}" ]; then
            echo "Skipping ${THIS} (selected: ${SELECTED})"
            exit 0
          fi

      # --- Auth (cloud-specific) -------------------------------------------
      # Both use OIDC federation — no long-lived credentials stored anywhere.

      - name: Auth — AWS
        if: matrix.cloud == 'aws'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: supply-chain-${{ github.run_id }}

      - name: Auth — Azure
        if: matrix.cloud == 'azure'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # --- Registry login (cloud-specific) ---------------------------------

      - name: Registry login — ECR
        if: matrix.cloud == 'aws'
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Registry login — ACR
        if: matrix.cloud == 'azure'
        run: az acr login --name "${{ secrets.ACR_LOGIN_SERVER }}"

      # Normalise registry/repo into cloud-agnostic env vars used by all
      # subsequent steps. After this point no step needs to know which cloud it is.
      - name: Set registry env vars
        run: |
          if [ "${{ matrix.cloud }}" = "aws" ]; then
            echo "REGISTRY=${{ steps.ecr-login.outputs.registry }}" >> $GITHUB_ENV
            echo "REPO=${{ secrets.ECR_REPO_NAME }}"               >> $GITHUB_ENV
          else
            echo "REGISTRY=${{ secrets.ACR_LOGIN_SERVER }}"        >> $GITHUB_ENV
            echo "REPO=${{ secrets.ACR_REPO_NAME }}"               >> $GITHUB_ENV
          fi

      # --- Build & Push ----------------------------------------------------

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push image
        run: |
          FULL_IMAGE="${REGISTRY}/${REPO}:${IMAGE_TAG}"

          docker buildx build \
            --build-arg GIT_SHA="${IMAGE_TAG}" \
            --tag "${FULL_IMAGE}" \
            --push \
            --provenance=false \
            --metadata-file /tmp/build-metadata.json \
            docker/hello-world

          # Extract the content-addressable digest from the build output.
          # All downstream steps (sign, attest, verify, policy tests) use this
          # digest reference so Kyverno can verify without re-pulling layers.
          DIGEST=$(jq -r '."containerimage.digest"' /tmp/build-metadata.json)
          IMAGE_REF="${REGISTRY}/${REPO}@${DIGEST}"

          echo "FULL_IMAGE=${FULL_IMAGE}" >> $GITHUB_ENV
          echo "DIGEST=${DIGEST}"         >> $GITHUB_ENV
          echo "IMAGE_REF=${IMAGE_REF}"   >> $GITHUB_ENV
          echo "Built: ${IMAGE_REF}"

      # --- Sign (Cosign keyless) -------------------------------------------
      # Cosign exchanges the GitHub Actions OIDC token for a short-lived Fulcio
      # certificate. The cert + signature are recorded in Rekor (public log).
      # No private keys involved — the identity is the workflow path itself.

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: v2.2.3

      - name: Sign image
        run: |
          cosign sign --yes "${IMAGE_REF}"
          echo "Signed: ${IMAGE_REF}"

      # --- SBOM (CycloneDX) ------------------------------------------------
      # Syft scans the image layers and produces a full package inventory.
      # Attached as a signed attestation so Kyverno can verify it at admission.

      - name: Install Syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
            | sh -s -- -b /usr/local/bin v0.105.1

      - name: Generate and attest SBOM
        run: |
          syft "${IMAGE_REF}" --output cyclonedx-json=sbom.cdx.json
          echo "SBOM components: $(jq '.components | length' sbom.cdx.json)"

          cosign attest --yes \
            --predicate sbom.cdx.json \
            --type cyclonedx \
            "${IMAGE_REF}"
          echo "SBOM attested"

      # --- SLSA Provenance -------------------------------------------------
      # Records where and how the image was built — repo, commit, workflow,
      # run ID. Meets SLSA v1.0 Build L1. Attached as a signed attestation.

      - name: Generate and attest SLSA provenance
        env:
          GH_REPOSITORY:  ${{ github.repository }}
          GH_REF_NAME:    ${{ github.ref_name }}
          GH_SHA:         ${{ github.sha }}
          GH_EVENT:       ${{ github.event_name }}
          GH_WORKFLOW:    ${{ github.workflow }}
          GH_RUN_ID:      ${{ github.run_id }}
          GH_RUN_ATTEMPT: ${{ github.run_attempt }}
          CLOUD:          ${{ matrix.cloud }}
        run: |
          BUILD_TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          FULL_IMAGE="${FULL_IMAGE}" \
          BUILD_TIMESTAMP="${BUILD_TIMESTAMP}" \
          python3 scripts/gen_provenance.py

          cosign attest --yes \
            --predicate provenance.json \
            --type slsaprovenance1 \
            "${IMAGE_REF}"
          echo "Provenance attested"

      # --- Verify attestations ---------------------------------------------
      # Re-verify everything from scratch to confirm the full attestation chain
      # is intact before we proceed to cluster deployment.

      - name: Verify signature and attestations
        run: |
          CERT_REGEXP="https://github.com/${{ github.repository }}.*"
          CERT_ISSUER="https://token.actions.githubusercontent.com"

          cosign verify \
            --certificate-identity-regexp "${CERT_REGEXP}" \
            --certificate-oidc-issuer "${CERT_ISSUER}" \
            "${IMAGE_REF}"
          echo "Signature verified"

          cosign verify-attestation \
            --certificate-identity-regexp "${CERT_REGEXP}" \
            --certificate-oidc-issuer "${CERT_ISSUER}" \
            --type cyclonedx "${IMAGE_REF}" \
            | jq -r '.payload | @base64d | fromjson |
                "SBOM verified — components: \(.predicate.components | length)"'

          cosign verify-attestation \
            --certificate-identity-regexp "${CERT_REGEXP}" \
            --certificate-oidc-issuer "${CERT_ISSUER}" \
            --type slsaprovenance1 "${IMAGE_REF}" \
            | jq -r '.payload | @base64d | fromjson |
                "Provenance verified — builder: \(.predicate.runDetails.builder.id)"'

          echo "--- attestation tree ---"
          cosign tree "${IMAGE_REF}"

      # --- Kubeconfig (cloud-specific) -------------------------------------

      - name: Kubeconfig — EKS
        if: matrix.cloud == 'aws'
        run: |
          aws eks update-kubeconfig \
            --region "${{ secrets.AWS_REGION }}" \
            --name "${{ secrets.EKS_CLUSTER_NAME }}"

      - name: Kubeconfig — AKS
        if: matrix.cloud == 'azure'
        run: |
          az aks get-credentials \
            --resource-group "${{ secrets.AKS_RESOURCE_GROUP }}" \
            --name "${{ secrets.AKS_CLUSTER_NAME }}" \
            --overwrite-existing

      # Exclude the default namespace from Kyverno webhooks. The smoke test
      # runs in supply-chain-demo, but kubectl itself creates objects in default
      # during connection setup and those should not be intercepted.
      - name: Exclude default namespace from Kyverno
        run: |
          kubectl label namespace default kyverno.io/exclude=always \
            --overwrite 2>/dev/null || true

      # Force Kyverno webhooks to failurePolicy=Ignore so that a brief webhook
      # unavailability does not block unrelated kubectl operations. Kyverno 3.1.4
      # does not respect the Helm value for this — must be patched directly.
      - name: Set Kyverno webhooks to failurePolicy=Ignore
        run: |
          for cfg in kyverno-policy-mutating-webhook-cfg \
                     kyverno-resource-mutating-webhook-cfg; do
            COUNT=$(kubectl get mutatingwebhookconfiguration "${cfg}" \
              -o jsonpath='{.webhooks}' \
              | python3 -c "import sys,json; print(len(json.load(sys.stdin)))" \
              2>/dev/null || echo 1)
            PATCH=$(python3 -c "import json; n=int('${COUNT}'); \
              print(json.dumps([{'op':'replace','path':f'/webhooks/{i}/failurePolicy','value':'Ignore'} \
              for i in range(n)]))")
            kubectl patch mutatingwebhookconfiguration "${cfg}" \
              --type=json -p="${PATCH}" 2>/dev/null || true
          done

      # --- Smoke test ------------------------------------------------------
      # Resolve the digest from the registry (digest env var may not persist
      # across steps in matrix jobs) and deploy an ephemeral pod to confirm
      # the image pulls and runs correctly on the cluster.

      - name: Smoke test
        run: |
          if [ "${{ matrix.cloud }}" = "aws" ]; then
            DIGEST_REF=$(aws ecr describe-images \
              --repository-name "${REPO}" \
              --region "${{ secrets.AWS_REGION }}" \
              --image-ids imageTag="${IMAGE_TAG}" \
              --query 'imageDetails[0].imageDigest' \
              --output text | xargs -I{} echo "${REGISTRY}/${REPO}@{}")
          else
            _DIG=$(az acr repository show \
              --name "${{ secrets.ACR_LOGIN_SERVER }}" \
              --image "${REPO}:${IMAGE_TAG}" \
              --query digest --output tsv)
            DIGEST_REF="${REGISTRY}/${REPO}@${_DIG}"
          fi
          echo "Image: ${DIGEST_REF}"

          kubectl delete pod smoke-test -n supply-chain-demo --ignore-not-found
          kubectl wait pod/smoke-test -n supply-chain-demo \
            --for=delete --timeout=60s 2>/dev/null || true

          kubectl run smoke-test \
            --image="${DIGEST_REF}" \
            --restart=Never \
            --namespace=supply-chain-demo \
            --command -- sh -c 'echo supply-chain-smoke-ok'

          for i in $(seq 1 30); do
            PHASE=$(kubectl get pod smoke-test -n supply-chain-demo \
              -o jsonpath='{.status.phase}' 2>/dev/null || echo "Pending")
            [ "${PHASE}" = "Succeeded" ] && echo "Smoke test passed" && break
            [ "${PHASE}" = "Failed"    ] && kubectl logs smoke-test -n supply-chain-demo && exit 1
            [ "${i}"     = "30"        ] && echo "Timed out waiting for smoke test" && exit 1
            sleep 3
          done

          kubectl delete pod smoke-test -n supply-chain-demo --ignore-not-found

      # --- Apply Kyverno policies ------------------------------------------
      # Policies are written once and stored in policies/. The registry URL
      # (REGISTRY_PLACEHOLDER) is substituted at apply time from the per-cloud
      # values file. This is what makes the policies cloud-agnostic.

      - name: Apply Kyverno policies
        run: |
          # Wait for CRDs in case Kyverno was just installed
          for i in $(seq 1 30); do
            kubectl get crd clusterpolicies.kyverno.io >/dev/null 2>&1 && break
            [ "${i}" = "30" ] && echo "Kyverno CRDs not ready" && exit 1
            sleep 10
          done

          kubectl rollout status deployment/kyverno-admission-controller \
            -n kyverno --timeout=120s
          sleep 10

          REGISTRY_VAL=$(grep '^REGISTRY=' policies/values/${{ matrix.cloud }}.env \
            | cut -d= -f2)

          mkdir -p /tmp/kyverno-rendered
          for f in policies/verify-*.yaml; do
            sed "s|REGISTRY_PLACEHOLDER|${REGISTRY_VAL}|g" "$f" \
              > "/tmp/kyverno-rendered/$(basename $f)"
          done

          kubectl apply --server-side --force-conflicts -f /tmp/kyverno-rendered/
          kubectl get clusterpolicies -o wide

      # --- Admission tests -------------------------------------------------
      # Three test cases validate that the policies work correctly:
      #   TC-01: our signed image must be admitted
      #   TC-02: image from wrong registry (nginx) must be blocked
      #   TC-03: image from wrong registry (alpine) must be blocked

      - name: Create supply-chain-demo namespace
        run: |
          kubectl create namespace supply-chain-demo \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: "TC-01 — Signed image must be ADMITTED"
        run: |
          # Fetch digest directly — env var from build step may not persist here
          if [ "${{ matrix.cloud }}" = "aws" ]; then
            DIGEST_REF=$(aws ecr describe-images \
              --repository-name "${REPO}" \
              --region "${{ secrets.AWS_REGION }}" \
              --image-ids imageTag="${IMAGE_TAG}" \
              --query 'imageDetails[0].imageDigest' \
              --output text | xargs -I{} echo "${REGISTRY}/${REPO}@{}")
          else
            _DIG=$(az acr repository show \
              --name "${{ secrets.ACR_LOGIN_SERVER }}" \
              --image "${REPO}:${IMAGE_TAG}" \
              --query digest --output tsv)
            DIGEST_REF="${REGISTRY}/${REPO}@${_DIG}"
          fi
          echo "TC-01 image: ${DIGEST_REF}"

          kubectl delete pod tc-01 -n supply-chain-demo --ignore-not-found
          sleep 2

          OUTPUT=$(kubectl run tc-01 \
            --image="${DIGEST_REF}" \
            --restart=Never \
            --namespace=supply-chain-demo \
            --command -- sh -c 'echo tc-01-ok' 2>&1) && ADMITTED=true || ADMITTED=false

          if [ "${ADMITTED}" = "true" ]; then
            echo "TC-01 PASS — signed image admitted"
            kubectl delete pod tc-01 -n supply-chain-demo --ignore-not-found
          else
            echo "TC-01 FAIL — signed image was unexpectedly blocked"
            echo "${OUTPUT}"
            exit 1
          fi

      - name: "TC-02 — nginx must be BLOCKED (wrong registry)"
        run: |
          kubectl delete pod tc-02 -n supply-chain-demo --ignore-not-found
          sleep 2

          OUTPUT=$(kubectl run tc-02 \
            --image=nginx:latest \
            --restart=Never \
            --namespace=supply-chain-demo \
            --command -- sh -c 'echo tc-02' 2>&1) && ADMITTED=true || ADMITTED=false

          if [ "${ADMITTED}" = "false" ]; then
            echo "TC-02 PASS — nginx blocked"
          else
            echo "TC-02 FAIL — nginx was admitted"
            kubectl delete pod tc-02 -n supply-chain-demo --ignore-not-found
            exit 1
          fi

      - name: "TC-03 — alpine must be BLOCKED (wrong registry)"
        run: |
          kubectl delete pod tc-03 -n supply-chain-demo --ignore-not-found
          sleep 2

          OUTPUT=$(kubectl run tc-03 \
            --image=alpine:latest \
            --restart=Never \
            --namespace=supply-chain-demo \
            --command -- sh -c 'echo tc-03' 2>&1) && ADMITTED=true || ADMITTED=false

          if [ "${ADMITTED}" = "false" ]; then
            echo "TC-03 PASS — alpine blocked"
          else
            echo "TC-03 FAIL — alpine was admitted"
            kubectl delete pod tc-03 -n supply-chain-demo --ignore-not-found
            exit 1
          fi

      - name: "TC-04 — Unsigned image from approved registry must be BLOCKED"
        run: |
          # Build and push an image without signing — from the correct registry.
          # Tests that registry origin alone is not sufficient for admission.
          TC04_TAG="tc04-unsigned-${{ github.run_id }}"
          TC04_IMAGE="${REGISTRY}/${REPO}:${TC04_TAG}"

          docker build --tag "${TC04_IMAGE}" docker/hello-world
          docker push "${TC04_IMAGE}"

          kubectl delete pod tc-04 -n supply-chain-demo --ignore-not-found
          sleep 2

          OUTPUT=$(kubectl run tc-04 \
            --image="${TC04_IMAGE}" \
            --restart=Never \
            --namespace=supply-chain-demo \
            --command -- sh -c 'echo tc-04' 2>&1) && ADMITTED=true || ADMITTED=false

          if [ "${ADMITTED}" = "false" ]; then
            echo "TC-04 PASS — unsigned image from approved registry blocked"
          else
            echo "TC-04 FAIL — unsigned image was admitted"
            kubectl delete pod tc-04 -n supply-chain-demo --ignore-not-found
            exit 1
          fi

      - name: "TC-05 — Policy scoping: unsigned image must be ADMITTED in default namespace"
        run: |
          # Re-uses the unsigned image from TC-04 to verify that Kyverno policies
          # are scoped to supply-chain-demo only and do not block the default namespace.
          TC04_TAG="tc04-unsigned-${{ github.run_id }}"
          TC04_IMAGE="${REGISTRY}/${REPO}:${TC04_TAG}"

          kubectl delete pod tc-05-scope -n default --ignore-not-found
          sleep 2

          OUTPUT=$(kubectl run tc-05-scope \
            --image="${TC04_IMAGE}" \
            --restart=Never \
            --namespace=default \
            --command -- sh -c 'echo tc-05-admitted' 2>&1) && ADMITTED=true || ADMITTED=false

          if [ "${ADMITTED}" = "true" ]; then
            echo "TC-05 PASS — unsigned image admitted in default namespace (policies correctly scoped)"
            kubectl delete pod tc-05-scope -n default --ignore-not-found
          else
            echo "TC-05 FAIL — image unexpectedly blocked in default namespace"
            echo "Policies may be leaking outside supply-chain-demo scope"
            echo "${OUTPUT}"
            exit 1
          fi

      - name: Summary
        if: always()
        run: |
          echo "========================================================"
          echo "  Supply Chain Pipeline — ${{ matrix.cloud }}"
          echo "========================================================"
          echo "  Image     : ${FULL_IMAGE}"
          echo "  Digest    : ${DIGEST}"
          echo "  Signed    : Cosign keyless (Sigstore/Fulcio/Rekor)"
          echo "  SBOM      : CycloneDX via Syft"
          echo "  Provenance: SLSA v1.0"
          echo "  Policies  : Enforce (verify-image-signature,"
          echo "              verify-sbom-cyclonedx, verify-slsa-provenance)"
          echo "  TC-01     : signed image admitted"
          echo "  TC-02     : nginx blocked"
          echo "  TC-03     : alpine blocked"
          echo "  TC-04     : unsigned from approved registry blocked"
          echo "  TC-05     : namespace scoping confirmed (default ns admitted)"
          echo "========================================================"